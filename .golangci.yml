linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - bodyclose
    - noctx
    - copyloopvar
    - contextcheck

linters-settings:
  gosec:
    excludes:
      - G104 # unhandled errors on deferred close — acceptable in this codebase

issues:
  exclude-dirs:
    - vendor
    # Pre-existing broken entry points — not part of the main server build.
    - cmd/fetchactions-graphql
    - cmd/fetchactions-oas2
    - cmd/fetchactions-oas3
    - skills/upload
    - .ignored

run:
  timeout: 5m
