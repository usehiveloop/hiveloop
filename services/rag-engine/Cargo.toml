[workspace]
resolver = "2"
members = [
    "crates/rag-engine-proto",
    "crates/rag-engine-lance",
    "crates/rag-engine-embed",
    "crates/rag-engine-rerank",
    "crates/rag-engine-chunker",
    "crates/rag-engine-server",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.91"
license = "MIT"
publish = false

# Shared dependency versions pinned at workspace level so every crate sees
# the same tonic/prost/tokio surface. Downstream tranches append here, they
# do not re-pin.
[workspace.dependencies]
tonic = "0.12"
tonic-build = "0.12"
tonic-health = "0.12"
prost = "0.13"
prost-types = "0.13"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["rt"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
tower = { version = "0.5", features = ["util"] }
tower-http = { version = "0.6", features = ["trace"] }
http = "1"
figment = { version = "0.10", features = ["env", "toml"] }
serde = { version = "1", features = ["derive"] }
serde_derive = "1"
anyhow = "1"
thiserror = "2"
async-trait = "0.1"
futures = "0.3"
subtle = "2"

# 2B deps
lancedb = { version = "0.27", features = ["aws"] }
lance-index = "4.0"
arrow = "57.2"
arrow-array = "57.2"
arrow-schema = "57.2"
arrow-buffer = "57.2"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
sha2 = "0.10"
tempfile = "3"
testcontainers = "0.27"
testcontainers-modules = { version = "0.15", features = ["minio"] }
aws-sdk-s3 = { version = "1", default-features = false, features = ["rt-tokio", "behavior-version-latest", "default-https-client"] }
aws-config = { version = "1", default-features = false, features = ["rt-tokio", "behavior-version-latest"] }
aws-credential-types = "1"
rand = "0.9"

# The proto crate is internal; depended on by path.
rag-engine-proto = { path = "crates/rag-engine-proto" }
rag-engine-lance = { path = "crates/rag-engine-lance" }
rag-engine-embed = { path = "crates/rag-engine-embed" }
rag-engine-rerank = { path = "crates/rag-engine-rerank" }
rag-engine-chunker = { path = "crates/rag-engine-chunker" }

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
