[workspace]
resolver = "2"
members = [
    "crates/rag-engine-proto",
    "crates/rag-engine-lance",
    "crates/rag-engine-embed",
    "crates/rag-engine-rerank",
    "crates/rag-engine-chunker",
    "crates/rag-engine-server",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "MIT"
publish = false

# Shared dependency versions pinned at workspace level so every crate sees
# the same tonic/prost/tokio surface. Downstream tranches append here, they
# do not re-pin.
[workspace.dependencies]
tonic = "0.12"
tonic-build = "0.12"
tonic-health = "0.12"
prost = "0.13"
prost-types = "0.13"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["rt"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
tower = { version = "0.5", features = ["util"] }
tower-http = { version = "0.6", features = ["trace"] }
http = "1"
figment = { version = "0.10", features = ["env", "toml"] }
serde = { version = "1", features = ["derive"] }
serde_derive = "1"
anyhow = "1"
thiserror = "2"
async-trait = "0.1"
futures = "0.3"
subtle = "2"

# 2G deps — observability (tracing spans → OTLP + Prometheus metrics + request middleware).
# Version pinning notes (see DECISIONS.md for full rationale):
#   * `tracing-opentelemetry 0.28` is the matching bridge for `opentelemetry 0.27`.
#     The plan requested 0.27 of the bridge, but that version targets
#     `opentelemetry 0.26` and conflicts with `opentelemetry-otlp 0.27` (which
#     itself requires `tonic ^0.12.3`, matching our workspace pin).
#   * `opentelemetry-otlp` enables both gRPC (default collector path) and
#     HTTP/proto as a fallback so operators can point at either.
tracing-opentelemetry = "0.28"
opentelemetry = "0.27"
opentelemetry_sdk = { version = "0.27", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.27", features = ["grpc-tonic", "http-proto", "trace"] }
opentelemetry-semantic-conventions = { version = "0.27", features = ["semconv_experimental"] }
prometheus = "0.13"
axum = "0.7"
ulid = "1"
pin-project-lite = "0.2"

# The proto crate is internal; depended on by path.
rag-engine-proto = { path = "crates/rag-engine-proto" }
rag-engine-lance = { path = "crates/rag-engine-lance" }
rag-engine-embed = { path = "crates/rag-engine-embed" }
rag-engine-rerank = { path = "crates/rag-engine-rerank" }
rag-engine-chunker = { path = "crates/rag-engine-chunker" }

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
