name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.10"
  CI: "true"
  GOTOOLCHAIN: local

jobs:
  internal-core:
    name: internal core ${{ matrix.group }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: hivy_test
          POSTGRES_USER: hivy
          POSTGRES_PASSWORD: localdev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U hivy -d hivy_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
      redis:
        image: redis:7-alpine
        ports:
          - 16279:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: 0
            group: auth-security
          - shard: 1
            group: billing-core
          - shard: 2
            group: billing-providers
          - shard: 3
            group: config-bootstrap
          - shard: 4
            group: bridge-gateway
          - shard: 5
            group: employee-runtime
          - shard: 6
            group: sandbox-providers
          - shard: 7
            group: mcp-skills
          - shard: 8
            group: specialists
          - shard: 9
            group: data-registry
          - shard: 10
            group: triggers-spider
          - shard: 11
            group: evals-observability
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: wait for services
        run: make ci-wait-services
        timeout-minutes: 2
      - name: test internal core shard
        run: make ci-test-internal-core SHARD_INDEX=${{ matrix.shard }} SHARD_TOTAL=12
        timeout-minutes: 5

  internal-handler:
    name: internal handler ${{ matrix.shard }}/8
    runs-on: ubuntu-latest
    timeout-minutes: 9
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: hivy_test
          POSTGRES_USER: hivy
          POSTGRES_PASSWORD: localdev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U hivy -d hivy_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
      redis:
        image: redis:7-alpine
        ports:
          - 16279:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: wait for services
        run: make ci-wait-services
        timeout-minutes: 2
      - name: start minio
        run: make ci-setup-minio
        timeout-minutes: 2
      - name: test handler shard
        run: make ci-test-internal-handler SHARD_INDEX=${{ matrix.shard }} SHARD_TOTAL=8
        timeout-minutes: 5
      - name: cleanup containers
        if: always()
        run: make ci-cleanup-containers

  internal-rag:
    name: internal rag
    runs-on: ubuntu-latest
    timeout-minutes: 9
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: hivy_test
          POSTGRES_USER: hivy
          POSTGRES_PASSWORD: localdev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U hivy -d hivy_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
      redis:
        image: redis:7-alpine
        ports:
          - 16279:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: wait for services
        run: make ci-wait-services
        timeout-minutes: 2
      - name: start rag services
        run: |
          make ci-start-qdrant
          make ci-setup-minio
        timeout-minutes: 5
      - name: test rag shard
        run: make ci-test-internal-rag
        timeout-minutes: 5
      - name: cleanup containers
        if: always()
        run: make ci-cleanup-containers

  internal-tasks:
    name: internal tasks ${{ matrix.shard }}/6
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: hivy_test
          POSTGRES_USER: hivy
          POSTGRES_PASSWORD: localdev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U hivy -d hivy_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
      redis:
        image: redis:7-alpine
        ports:
          - 16279:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: wait for services
        run: make ci-wait-services
        timeout-minutes: 2
      - name: start hindsight
        run: make ci-start-hindsight
        timeout-minutes: 5
      - name: test tasks shard
        run: make ci-test-internal-tasks SHARD_INDEX=${{ matrix.shard }} SHARD_TOTAL=6
        timeout-minutes: 5
      - name: cleanup containers
        if: always()
        run: make ci-cleanup-containers

  internal-hindsight:
    name: internal hindsight
    runs-on: ubuntu-latest
    timeout-minutes: 9
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: hivy_test
          POSTGRES_USER: hivy
          POSTGRES_PASSWORD: localdev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U hivy -d hivy_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
      redis:
        image: redis:7-alpine
        ports:
          - 16279:6379
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: wait for services
        run: make ci-wait-services
        timeout-minutes: 2
      - name: start hindsight
        run: make ci-start-hindsight
        timeout-minutes: 5
      - name: test hindsight package
        run: make ci-test-internal-hindsight
        timeout-minutes: 5
      - name: cleanup containers
        if: always()
        run: make ci-cleanup-containers

  internal-integrations:
    name: internal integrations
    runs-on: ubuntu-latest
    timeout-minutes: 9
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: hivy_test
          POSTGRES_USER: hivy
          POSTGRES_PASSWORD: localdev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U hivy -d hivy_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
      redis:
        image: redis:7-alpine
        ports:
          - 16279:6379
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: wait for services
        run: make ci-wait-services
        timeout-minutes: 2
      - name: start nango
        run: make ci-start-nango
        timeout-minutes: 5
      - name: test integrations and nango
        run: make ci-test-internal-integrations SHARD_TOTAL=1
        timeout-minutes: 5
      - name: cleanup containers
        if: always()
        run: make ci-cleanup-containers

  internal-storage:
    name: internal storage
    runs-on: ubuntu-latest
    timeout-minutes: 8
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: hivy_test
          POSTGRES_USER: hivy
          POSTGRES_PASSWORD: localdev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U hivy -d hivy_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
      redis:
        image: redis:7-alpine
        ports:
          - 16279:6379
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: wait for services
        run: make ci-wait-services
        timeout-minutes: 2
      - name: start minio
        run: make ci-setup-minio
        timeout-minutes: 2
      - name: test storage
        run: make ci-test-internal-storage
        timeout-minutes: 5
      - name: cleanup containers
        if: always()
        run: make ci-cleanup-containers

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 8
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: hivy_test
          POSTGRES_USER: hivy
          POSTGRES_PASSWORD: localdev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U hivy -d hivy_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
      redis:
        image: redis:7-alpine
        ports:
          - 16279:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: wait for services
        run: make ci-wait-services
        timeout-minutes: 2
      - name: test e2e
        run: make ci-test-e2e
        timeout-minutes: 5

  cmd:
    name: cmd packages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: test cmd packages
        run: make ci-test-cmd
        timeout-minutes: 5

  web:
    name: web
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.18.2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/web
        timeout-minutes: 5
      - name: typecheck and build
        run: make ci-test-web
        timeout-minutes: 5

  runtime:
    name: sandbox runtime
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sandboxes/runtime -> target
      - name: runtime checks
        run: make ci-test-runtime
        timeout-minutes: 6

  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: quality checks
        run: make ci-quality
        timeout-minutes: 5

  result:
    name: ci result
    if: always()
    runs-on: ubuntu-latest
    needs:
      - internal-core
      - internal-handler
      - internal-rag
      - internal-tasks
      - internal-hindsight
      - internal-integrations
      - internal-storage
      - e2e
      - cmd
      - web
      - runtime
      - quality
    steps:
      - name: check result
        run: |
          for result in \
            "${{ needs.internal-core.result }}" \
            "${{ needs.internal-handler.result }}" \
            "${{ needs.internal-rag.result }}" \
            "${{ needs.internal-tasks.result }}" \
            "${{ needs.internal-hindsight.result }}" \
            "${{ needs.internal-integrations.result }}" \
            "${{ needs.internal-storage.result }}" \
            "${{ needs.e2e.result }}" \
            "${{ needs.cmd.result }}" \
            "${{ needs.web.result }}" \
            "${{ needs.runtime.result }}" \
            "${{ needs.quality.result }}"; do
            test "$result" = success
          done
