name: test-api

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  ENVIRONMENT: development
  PORT: 8080
  LOG_LEVEL: info
  LOG_FORMAT: json
  POSTGRES_USER: hiveloop
  POSTGRES_PASSWORD: localdev
  POSTGRES_DB: hiveloop
  POSTGRES_PORT: 5433
  DB_HOST: localhost
  DB_PORT: 5433
  DB_USER: hiveloop
  DB_PASSWORD: localdev
  DB_NAME: hiveloop
  DB_SSLMODE: disable
  KMS_TYPE: aead
  KMS_KEY: OEx8eTY9N8RbDN6nM9Xwq3qP0c0w4uQ3Yl5o2l5P5Y8=
  REDIS_ADDR: localhost:6379
  REDIS_DB: 0
  REDIS_CACHE_TTL: 30m
  MEM_CACHE_TTL: 5m
  MEM_CACHE_MAX_SIZE: 10000
  QDRANT_HOST: localhost
  QDRANT_PORT: 6334
  JWT_SIGNING_KEY: local-dev-signing-key-for-tests-only
  CORS_ORIGINS: http://localhost:3000
  # AUTH_RSA_PRIVATE_KEY is generated per-job (see "Generate auth RSA key" steps)
  AUTH_ISSUER: hiveloop
  AUTH_AUDIENCE: https://api.usehiveloop.com
  NANGO_ENDPOINT: https://integrations.dev.hiveloop.com
  NANGO_SECRET_KEY: ${{ secrets.NANGO_SECRET_KEY }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}

jobs:
  test-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
      - name: Generate auth RSA key
        run: |
          openssl genrsa 2048 2>/dev/null | base64 | tr -d '\n' > /tmp/auth_key_b64
          echo "AUTH_RSA_PRIVATE_KEY=$(cat /tmp/auth_key_b64)" >> $GITHUB_ENV
      - name: start infrastructure
        run: make test-setup
        timeout-minutes: 5
      - name: run auth tests
        run: make test-auth
        timeout-minutes: 5
      - name: cleanup
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  test-nango:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
      - name: Generate auth RSA key
        run: |
          openssl genrsa 2048 2>/dev/null | base64 | tr -d '\n' > /tmp/auth_key_b64
          echo "AUTH_RSA_PRIVATE_KEY=$(cat /tmp/auth_key_b64)" >> $GITHUB_ENV
      - name: start infrastructure
        run: make test-setup
        timeout-minutes: 5
      - name: run nango tests
        run: make test-nango
        timeout-minutes: 5
      - name: cleanup
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  test-proxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
      - name: Generate auth RSA key
        run: |
          openssl genrsa 2048 2>/dev/null | base64 | tr -d '\n' > /tmp/auth_key_b64
          echo "AUTH_RSA_PRIVATE_KEY=$(cat /tmp/auth_key_b64)" >> $GITHUB_ENV
      - name: start infrastructure
        run: make test-setup
        timeout-minutes: 5
      - name: run proxy tests
        run: make test-proxy
        timeout-minutes: 5
      - name: cleanup
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  test-connect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
      - name: Generate auth RSA key
        run: |
          openssl genrsa 2048 2>/dev/null | base64 | tr -d '\n' > /tmp/auth_key_b64
          echo "AUTH_RSA_PRIVATE_KEY=$(cat /tmp/auth_key_b64)" >> $GITHUB_ENV
      - name: start infrastructure
        run: make test-setup
        timeout-minutes: 5
      - name: run connect tests
        run: make test-connect
        timeout-minutes: 5
      - name: cleanup
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  # Sharded internal unit tests with -race. Total wall-clock target: <4 min.
  # Packages are distributed round-robin (NR % N) across shards; imbalance is
  # acceptable because the heavy packages (handler, streaming, proxy, sandbox)
  # land in different shards by chance of alphabetical ordering.
  test-core:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
      - name: Generate auth RSA key
        run: |
          openssl genrsa 2048 2>/dev/null | base64 | tr -d '\n' > /tmp/auth_key_b64
          echo "AUTH_RSA_PRIVATE_KEY=$(cat /tmp/auth_key_b64)" >> $GITHUB_ENV
      - name: start infrastructure
        run: make test-setup
        timeout-minutes: 5
      - name: run internal tests (shard ${{ matrix.shard }}/4)
        run: |
          # Live external-provider RAG tests remain opt-in behind env gates;
          # local Postgres, Redis, MinIO, and Qdrant-backed tests run here.
          PACKAGES=$(go list ./internal/... \
            | grep -vE '^github.com/usehiveloop/hiveloop/internal/handler$' \
            | awk -v s=${{ matrix.shard }} -v n=4 'NR % n == s')
          echo "Running shard ${{ matrix.shard }} packages:"
          echo "$PACKAGES"
          go test $PACKAGES -race -count=1
        timeout-minutes: 10
      - name: cleanup
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  # internal/handler dominates wall clock. Run it as fast sharded integration
  # coverage; the remaining internal package shards keep -race enabled.
  test-handler:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
      - name: Generate auth RSA key
        run: |
          openssl genrsa 2048 2>/dev/null | base64 | tr -d '\n' > /tmp/auth_key_b64
          echo "AUTH_RSA_PRIVATE_KEY=$(cat /tmp/auth_key_b64)" >> $GITHUB_ENV
      - name: start infrastructure
        run: make test-setup
        timeout-minutes: 5
      - name: run handler tests (shard ${{ matrix.shard }}/8)
        run: |
          TESTS=$(go test ./internal/handler -list '^Test' | awk -v s=${{ matrix.shard }} -v n=8 'NR % n == s')
          echo "Running handler shard ${{ matrix.shard }} tests:"
          echo "$TESTS"
          if [ -z "$TESTS" ]; then
            echo "No tests assigned to this shard"
            exit 0
          fi
          PATTERN=$(printf '%s\n' "$TESTS" | paste -sd'|' -)
          go test ./internal/handler -count=1 -v -run "^(${PATTERN})$"
        timeout-minutes: 5
      - name: cleanup
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  test-hindsight:
    runs-on: ubuntu-latest
    env:
      HINDSIGHT_API_URL: http://localhost:8888
      HINDSIGHT_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
      - name: Generate Hindsight env file
        env:
          HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY: ${{ secrets.HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY || secrets.OPENAI_API_KEY }}
          HINDSIGHT_API_LLM_API_KEY: ${{ secrets.HINDSIGHT_API_LLM_API_KEY || secrets.OPENROUTER_API_KEY }}
          HINDSIGHT_API_RERANKER_ZEROENTROPY_API_KEY: ${{ secrets.HINDSIGHT_API_RERANKER_ZEROENTROPY_API_KEY || secrets.ZEROENTROPY_API_KEY }}
        run: |
          missing=0
          for name in HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY HINDSIGHT_API_LLM_API_KEY HINDSIGHT_API_RERANKER_ZEROENTROPY_API_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for real Hindsight integration tests"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          cat > .env.hindsight <<EOF
          HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY=${HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY}
          HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL=text-embedding-3-small
          HINDSIGHT_API_EMBEDDINGS_PROVIDER=openai
          HINDSIGHT_API_HOST=0.0.0.0
          HINDSIGHT_API_LLM_API_KEY=${HINDSIGHT_API_LLM_API_KEY}
          HINDSIGHT_API_LLM_BASE_URL=https://openrouter.ai/api/v1
          HINDSIGHT_API_LLM_MODEL=openai/gpt-oss-20b
          HINDSIGHT_API_LLM_PROVIDER=openai
          HINDSIGHT_API_LOG_FORMAT=json
          HINDSIGHT_API_LOG_LEVEL=info
          HINDSIGHT_API_PORT=8888
          HINDSIGHT_API_RERANKER_PROVIDER=zeroentropy
          HINDSIGHT_API_RERANKER_ZEROENTROPY_API_KEY=${HINDSIGHT_API_RERANKER_ZEROENTROPY_API_KEY}
          HINDSIGHT_API_RERANKER_ZEROENTROPY_MODEL=zerank-2
          HINDSIGHT_API_RUN_MIGRATIONS_ON_STARTUP=true
          HINDSIGHT_API_WORKERS=2
          HINDSIGHT_API_WORKER_ENABLED=true
          EOF
      - name: start Hindsight
        run: docker compose --profile hindsight up -d hindsight
        timeout-minutes: 5
      - name: wait for Hindsight
        run: |
          for i in $(seq 1 60); do
            if curl -fsS "$HINDSIGHT_API_URL/health" >/dev/null 2>&1 || curl -fsS "$HINDSIGHT_API_URL" >/dev/null 2>&1; then
              echo "Hindsight is ready"
              exit 0
            fi
            sleep 2
          done
          docker compose --profile hindsight logs --tail=200 hindsight
          exit 1
        timeout-minutes: 3
      - name: run real Hindsight tests
        run: go test ./internal/hindsight -run 'TestRealHindsight' -count=1 -v -timeout=5m
        timeout-minutes: 6
      - name: cleanup
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  # Remaining e2e tests not already covered by the dedicated e2e jobs
  # (test-auth, test-nango, test-proxy, test-connect).
  test-e2e-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
      - name: Generate auth RSA key
        run: |
          openssl genrsa 2048 2>/dev/null | base64 | tr -d '\n' > /tmp/auth_key_b64
          echo "AUTH_RSA_PRIVATE_KEY=$(cat /tmp/auth_key_b64)" >> $GITHUB_ENV
      - name: start infrastructure
        run: make test-setup
        timeout-minutes: 5
      - name: run remaining e2e tests
        run: |
          go test ./e2e/... -race -count=1 -timeout=5m \
            -skip '^(TestOrg|TestE2E_Integration|TestE2E_Proxy|TestE2E_Fireworks|TestE2E_Connect)'
        timeout-minutes: 5
      - name: cleanup
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  results:
    if: always()
    needs:
      [
        test-auth,
        test-nango,
        test-proxy,
        test-connect,
        test-core,
        test-handler,
        test-hindsight,
        test-e2e-core,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: check results
        run: |
          if [ "${{ needs.test-auth.result }}" != "success" ] || \
             [ "${{ needs.test-nango.result }}" != "success" ] || \
             [ "${{ needs.test-proxy.result }}" != "success" ] || \
             [ "${{ needs.test-connect.result }}" != "success" ] || \
             [ "${{ needs.test-core.result }}" != "success" ] || \
             [ "${{ needs.test-handler.result }}" != "success" ] || \
             [ "${{ needs.test-hindsight.result }}" != "success" ] || \
             [ "${{ needs.test-e2e-core.result }}" != "success" ]; then
            echo "One or more test jobs failed"
            exit 1
          fi
          echo "All test jobs passed"
