name: test-api

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  ENVIRONMENT: development
  PORT: 8080
  LOG_LEVEL: info
  LOG_FORMAT: json
  POSTGRES_USER: hiveloop
  POSTGRES_PASSWORD: localdev
  POSTGRES_DB: hiveloop
  POSTGRES_PORT: 5433
  DB_HOST: localhost
  DB_PORT: 5433
  DB_USER: hiveloop
  DB_PASSWORD: localdev
  DB_NAME: hiveloop
  DB_SSLMODE: disable
  KMS_TYPE: aead
  KMS_KEY: OEx8eTY9N8RbDN6nM9Xwq3qP0c0w4uQ3Yl5o2l5P5Y8=
  REDIS_ADDR: localhost:6379
  REDIS_DB: 0
  REDIS_CACHE_TTL: 30m
  MEM_CACHE_TTL: 5m
  MEM_CACHE_MAX_SIZE: 10000
  JWT_SIGNING_KEY: local-dev-signing-key-for-tests-only
  CORS_ORIGINS: http://localhost:3000
  VAULT_TOKEN: hiveloop-dev-token
  VAULT_ADDRESS: http://localhost:8200
  # AUTH_RSA_PRIVATE_KEY is generated per-job (see "Generate auth RSA key" steps)
  AUTH_ISSUER: hiveloop
  AUTH_AUDIENCE: https://api.usehiveloop.com
  NANGO_ENDPOINT: https://integrations.dev.hiveloop.com
  NANGO_SECRET_KEY: ${{ secrets.NANGO_SECRET_KEY }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}

jobs:
  test-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Generate auth RSA key
        run: |
          openssl genrsa 2048 2>/dev/null | base64 | tr -d '\n' > /tmp/auth_key_b64
          echo "AUTH_RSA_PRIVATE_KEY=$(cat /tmp/auth_key_b64)" >> $GITHUB_ENV
      - name: start infrastructure
        run: make test-setup
        timeout-minutes: 5
      - name: run auth tests
        run: make test-auth
        timeout-minutes: 5
      - name: cleanup
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  test-nango:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Generate auth RSA key
        run: |
          openssl genrsa 2048 2>/dev/null | base64 | tr -d '\n' > /tmp/auth_key_b64
          echo "AUTH_RSA_PRIVATE_KEY=$(cat /tmp/auth_key_b64)" >> $GITHUB_ENV
      - name: start infrastructure
        run: make test-setup
        timeout-minutes: 5
      - name: run nango tests
        run: make test-nango
        timeout-minutes: 5
      - name: cleanup
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  test-proxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Generate auth RSA key
        run: |
          openssl genrsa 2048 2>/dev/null | base64 | tr -d '\n' > /tmp/auth_key_b64
          echo "AUTH_RSA_PRIVATE_KEY=$(cat /tmp/auth_key_b64)" >> $GITHUB_ENV
      - name: start infrastructure
        run: make test-setup
        timeout-minutes: 5
      - name: run proxy tests
        run: make test-proxy
        timeout-minutes: 5
      - name: cleanup
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  test-connect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Generate auth RSA key
        run: |
          openssl genrsa 2048 2>/dev/null | base64 | tr -d '\n' > /tmp/auth_key_b64
          echo "AUTH_RSA_PRIVATE_KEY=$(cat /tmp/auth_key_b64)" >> $GITHUB_ENV
      - name: start infrastructure
        run: make test-setup
        timeout-minutes: 5
      - name: run connect tests
        run: make test-connect
        timeout-minutes: 5
      - name: cleanup
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  test-vault:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Generate auth RSA key
        run: |
          openssl genrsa 2048 2>/dev/null | base64 | tr -d '\n' > /tmp/auth_key_b64
          echo "AUTH_RSA_PRIVATE_KEY=$(cat /tmp/auth_key_b64)" >> $GITHUB_ENV
      - name: start infrastructure
        run: make test-setup
        timeout-minutes: 5
      - name: run vault tests
        run: make test-vault
        timeout-minutes: 5
      - name: cleanup
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  # Sharded internal unit tests with -race. Total wall-clock target: <4 min.
  # Packages are distributed round-robin (NR % N) across shards; imbalance is
  # acceptable because the heavy packages (handler, streaming, proxy, sandbox)
  # land in different shards by chance of alphabetical ordering.
  test-core:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Generate auth RSA key
        run: |
          openssl genrsa 2048 2>/dev/null | base64 | tr -d '\n' > /tmp/auth_key_b64
          echo "AUTH_RSA_PRIVATE_KEY=$(cat /tmp/auth_key_b64)" >> $GITHUB_ENV
      - name: start infrastructure
        run: make test-setup
        timeout-minutes: 5
      - name: run internal tests (shard ${{ matrix.shard }}/4)
        run: |
          # internal/rag (root), ragclient, and testhelpers spawn the Rust
          # rag-engine binary and require MinIO; run them in a dedicated
          # E2E job with infra, not the sharded unit suite.
          PACKAGES=$(go list ./internal/... \
            | grep -vE '^github.com/usehiveloop/hiveloop/internal/rag$' \
            | grep -vE '^github.com/usehiveloop/hiveloop/internal/rag/ragclient$' \
            | grep -vE '^github.com/usehiveloop/hiveloop/internal/rag/testhelpers$' \
            | awk -v s=${{ matrix.shard }} -v n=4 'NR % n == s')
          echo "Running shard ${{ matrix.shard }} packages:"
          echo "$PACKAGES"
          go test $PACKAGES -race -count=1
        timeout-minutes: 5
      - name: cleanup
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  # Remaining e2e tests not already covered by the dedicated e2e jobs
  # (test-auth, test-nango, test-proxy, test-connect, test-vault).
  test-e2e-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Generate auth RSA key
        run: |
          openssl genrsa 2048 2>/dev/null | base64 | tr -d '\n' > /tmp/auth_key_b64
          echo "AUTH_RSA_PRIVATE_KEY=$(cat /tmp/auth_key_b64)" >> $GITHUB_ENV
      - name: start infrastructure
        run: make test-setup
        timeout-minutes: 5
      - name: run remaining e2e tests
        run: |
          go test ./e2e/... -count=1 -timeout=5m \
            -skip '^(TestOrg|TestE2E_Integration|TestE2E_Proxy|TestE2E_Fireworks|TestE2E_Connect|TestVaultE2E)'
        timeout-minutes: 5
      - name: cleanup
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  results:
    if: always()
    needs:
      [
        test-auth,
        test-nango,
        test-proxy,
        test-connect,
        test-vault,
        test-core,
        test-e2e-core,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: check results
        run: |
          if [ "${{ needs.test-auth.result }}" != "success" ] || \
             [ "${{ needs.test-nango.result }}" != "success" ] || \
             [ "${{ needs.test-proxy.result }}" != "success" ] || \
             [ "${{ needs.test-connect.result }}" != "success" ] || \
             [ "${{ needs.test-vault.result }}" != "success" ] || \
             [ "${{ needs.test-core.result }}" != "success" ] || \
             [ "${{ needs.test-e2e-core.result }}" != "success" ]; then
            echo "One or more test jobs failed"
            exit 1
          fi
          echo "All test jobs passed"
