name: publish runtime manifests

# Publishes multi-arch tags from already-built architecture images.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish.
        required: true
        type: string
  repository_dispatch:
    types: [publish-runtime-manifests]
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: publish runtime manifests
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch' || contains(github.event.head_commit.message, '[publish-runtime-manifests]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: resolve release
        id: version
        shell: bash
        run: |
          tag="${{ inputs.tag }}"
          if [[ -z "${tag}" ]]; then
            tag="${{ github.event.client_payload.tag }}"
          fi
          if [[ -z "${tag}" ]]; then
            tag="v1.0.0"
          fi
          git fetch --tags --force
          commit="$(git rev-list -n 1 "${tag}")"
          ./scripts/release/derive-version.sh "${tag}" "${commit}" >> "$GITHUB_OUTPUT"

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: publish manifests
        shell: bash
        run: |
          employee="ghcr.io/usehivy/hivy-sandboxes-runtime"
          specialist="ghcr.io/usehivy/hivy-sandboxes-runtime-specialist"
          for image in "$employee" "$specialist"; do
            docker buildx imagetools create \
              -t "${image}:${{ steps.version.outputs.RELEASE_TAG }}" \
              "${image}:${{ steps.version.outputs.RELEASE_TAG }}-amd64" \
              "${image}:${{ steps.version.outputs.RELEASE_TAG }}-arm64"
            docker buildx imagetools create \
              -t "${image}:${{ steps.version.outputs.RELEASE_VERSION }}" \
              "${image}:${{ steps.version.outputs.RELEASE_TAG }}-amd64" \
              "${image}:${{ steps.version.outputs.RELEASE_TAG }}-arm64"
            if [[ "${{ steps.version.outputs.RELEASE_IS_PRERELEASE }}" != "true" ]]; then
              docker buildx imagetools create \
                -t "${image}:latest" \
                "${image}:${{ steps.version.outputs.RELEASE_TAG }}-amd64" \
                "${image}:${{ steps.version.outputs.RELEASE_TAG }}-arm64"
            fi
          done

      - name: write manifest
        run: ./scripts/release/write-manifest.sh "${{ steps.version.outputs.RELEASE_TAG }}" release-manifest.json "${{ steps.version.outputs.RELEASE_COMMIT }}"

      - name: upload manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.version.outputs.RELEASE_TAG }}" release-manifest.json --clobber
