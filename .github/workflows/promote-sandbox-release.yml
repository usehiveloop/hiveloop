name: promote-sandbox-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to promote, for example v1.2.3
        required: true
        type: string
      size:
        description: Snapshot sizes to register
        required: true
        default: all
        type: choice
        options:
          - all
          - small
          - medium
          - large
          - xlarge
      runtime:
        description: Register runtime bridge snapshots
        required: true
        default: true
        type: boolean
      employee:
        description: Register employee sandbox snapshots
        required: true
        default: true
        type: boolean
  workflow_call:
    inputs:
      tag:
        description: Release tag to promote, for example v1.2.3
        required: true
        type: string
      size:
        description: Snapshot sizes to register
        required: true
        type: string
      runtime:
        description: Register runtime bridge snapshots
        required: true
        type: boolean
      employee:
        description: Register employee sandbox snapshots
        required: true
        type: boolean

permissions:
  contents: read
  packages: read

jobs:
  promote:
    name: promote sandbox release
    runs-on: ubuntu-latest
    env:
      HIVY_DAYTONA_API_KEY: ${{ secrets.HIVY_DAYTONA_API_KEY }}
      HIVY_DAYTONA_API_URL: ${{ secrets.HIVY_DAYTONA_API_URL || vars.HIVY_DAYTONA_API_URL }}
      HIVY_DAYTONA_TARGET: ${{ secrets.HIVY_DAYTONA_TARGET || vars.HIVY_DAYTONA_TARGET }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.10"
          cache: true

      - name: derive version
        id: version
        run: ./scripts/release/derive-version.sh "${{ inputs.tag }}" "$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: register runtime bridge snapshots
        if: inputs.runtime
        run: |
          go run ./cmd/buildtemplates bridge \
            -version="${{ steps.version.outputs.RELEASE_TAG }}" \
            -bridge-version="${{ steps.version.outputs.RELEASE_TAG }}" \
            -size="${{ inputs.size }}" \
            -build-image=false \
            -register-snapshots=true \
            -latest=false

      - name: register employee sandbox snapshots
        if: inputs.employee
        run: |
          go run ./cmd/buildtemplates employee-sandbox \
            -version="${{ steps.version.outputs.RELEASE_TAG }}" \
            -size="${{ inputs.size }}"
