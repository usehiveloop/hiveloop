name: test-rag-e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  POSTGRES_USER: hiveloop
  POSTGRES_PASSWORD: localdev
  POSTGRES_DB: hiveloop

jobs:
  # Sharded RAG E2E suite: Rust crate tests (rag-engine-*) + Go tests that
  # spawn a real rag-engine binary and probe MinIO. Five shards run in
  # parallel; each tests its slice of Rust crates (mod 5) plus its slice
  # of Go tests (sorted by test name, mod 5). The actual `go test` /
  # `cargo test` step is capped at 5 minutes — cargo build runs in a
  # separate step with its own cache-sensitive budget.
  test-rag:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/rag-engine -> target
          # Share one cache across all five shards; key off Cargo.lock so
          # dep bumps invalidate naturally.
          shared-key: rag-engine-e2e

      - name: start services (postgres + redis + minio + bucket)
        run: make test-services-up
        timeout-minutes: 3

      - name: build rag-engine binary (release)
        working-directory: services/rag-engine
        run: cargo build --release --bin rag-engine-server
        timeout-minutes: 10

      - name: run shard ${{ matrix.shard }} tests
        env:
          SHARD: ${{ matrix.shard }}
          TOTAL: "5"
        run: |
          set -eo pipefail

          # ------------ Rust crate tests -------------------------------
          # Six crates, round-robin by mod 5 → shard 0 gets two.
          CRATES=(rag-engine-chunker rag-engine-embed rag-engine-lance \
                  rag-engine-proto rag-engine-rerank rag-engine-server)
          for i in "${!CRATES[@]}"; do
            if [ $(( i % TOTAL )) -eq "$SHARD" ]; then
              echo "::group::cargo test -p ${CRATES[$i]}"
              (cd services/rag-engine && cargo test -p "${CRATES[$i]}")
              echo "::endgroup::"
            fi
          done

          # ------------ Go tests ---------------------------------------
          # Enumerate test names across the three infra-dependent
          # packages, partition alphabetically by NR mod TOTAL.
          PKGS="./internal/rag ./internal/rag/ragclient ./internal/rag/testhelpers"
          ALL=$(for p in $PKGS; do
                  go test -list '^Test' $p 2>/dev/null | grep -E '^Test'
                done | sort -u)
          MY=$(echo "$ALL" | awk -v s="$SHARD" -v n="$TOTAL" 'NR % n == s')
          if [ -z "$MY" ]; then
            echo "Shard $SHARD has no Go tests to run"
            exit 0
          fi

          REGEX="^($(echo "$MY" | tr '\n' '|' | sed 's/|$//'))$"
          echo "::group::go test shard $SHARD ($(echo "$MY" | wc -l) tests)"
          echo "$MY"
          go test -race -count=1 -run "$REGEX" $PKGS
          echo "::endgroup::"
        timeout-minutes: 5

      - name: cleanup
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true
