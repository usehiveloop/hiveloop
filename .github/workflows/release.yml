name: release

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  prepare:
    name: prepare release version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.RELEASE_TAG }}
      version: ${{ steps.version.outputs.RELEASE_VERSION }}
      dashed: ${{ steps.version.outputs.RELEASE_DASHED }}
      prerelease: ${{ steps.version.outputs.RELEASE_IS_PRERELEASE }}
      commit: ${{ steps.version.outputs.RELEASE_COMMIT }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: derive version
        id: version
        run: ./scripts/release/derive-version.sh "${{ github.event.release.tag_name }}" "$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: verify release commit is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main

  api-image:
    name: api image
    runs-on: ubuntu-24.04-arm
    needs: prepare
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v4

      - name: login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: image tags
        id: tags
        shell: bash
        run: |
          tags="ghcr.io/usehivy/hivy:${{ needs.prepare.outputs.tag }}"
          tags="${tags},ghcr.io/usehivy/hivy:${{ needs.prepare.outputs.version }}"
          if [[ "${{ needs.prepare.outputs.prerelease }}" != "true" ]]; then
            tags="${tags},ghcr.io/usehivy/hivy:latest"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.tag }}
            COMMIT=${{ needs.prepare.outputs.commit }}
          labels: |
            org.opencontainers.image.source=https://github.com/usehivy/hivy
            org.opencontainers.image.revision=${{ needs.prepare.outputs.commit }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sandbox-runtime-images:
    name: sandbox runtime images (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux/amd64
            make_target: sandbox-runtime-linux-build-amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux/arm64
            make_target: sandbox-runtime-linux-build-arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: sandbox-runtime-release-${{ matrix.target }}
          workspaces: sandboxes/runtime -> target

      - name: build runtime binary
        run: make ${{ matrix.make_target }}

      - name: prepare runtime Docker build context
        run: cp "sandboxes/runtime/dist/hivy-sandboxes-runtime-${{ matrix.target }}" sandboxes/runtime/hivy-sandboxes-runtime

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push employee runtime image
        uses: docker/build-push-action@v7
        with:
          context: sandboxes/runtime
          file: sandboxes/runtime/Dockerfile.runtime
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/usehivy/hivy-sandboxes-runtime:${{ needs.prepare.outputs.tag }}-${{ matrix.arch }}
            ghcr.io/usehivy/hivy-sandboxes-runtime:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.tag }}
            COMMIT=${{ needs.prepare.outputs.commit }}
          labels: |
            org.opencontainers.image.source=https://github.com/usehivy/hivy
            org.opencontainers.image.revision=${{ needs.prepare.outputs.commit }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=sandbox-runtime-employee-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=sandbox-runtime-employee-${{ matrix.arch }}

      - name: build and push specialist runtime image
        uses: docker/build-push-action@v7
        with:
          context: sandboxes/runtime
          file: sandboxes/runtime/Dockerfile.specialist
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/usehivy/hivy-sandboxes-runtime-specialist:${{ needs.prepare.outputs.tag }}-${{ matrix.arch }}
            ghcr.io/usehivy/hivy-sandboxes-runtime-specialist:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.tag }}
            COMMIT=${{ needs.prepare.outputs.commit }}
          labels: |
            org.opencontainers.image.source=https://github.com/usehivy/hivy
            org.opencontainers.image.revision=${{ needs.prepare.outputs.commit }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=sandbox-runtime-specialist-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=sandbox-runtime-specialist-${{ matrix.arch }}

  sandbox-runtime-manifests:
    name: sandbox runtime manifests
    runs-on: ubuntu-latest
    needs:
      - prepare
      - sandbox-runtime-images
    steps:
      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: create multi-arch manifests
        shell: bash
        run: |
          employee="ghcr.io/usehivy/hivy-sandboxes-runtime"
          specialist="ghcr.io/usehivy/hivy-sandboxes-runtime-specialist"
          for image in "$employee" "$specialist"; do
            docker buildx imagetools create \
              -t "${image}:${{ needs.prepare.outputs.tag }}" \
              "${image}:${{ needs.prepare.outputs.tag }}-amd64" \
              "${image}:${{ needs.prepare.outputs.tag }}-arm64"
            docker buildx imagetools create \
              -t "${image}:${{ needs.prepare.outputs.version }}" \
              "${image}:${{ needs.prepare.outputs.version }}-amd64" \
              "${image}:${{ needs.prepare.outputs.version }}-arm64"
            if [[ "${{ needs.prepare.outputs.prerelease }}" != "true" ]]; then
              docker buildx imagetools create \
                -t "${image}:latest" \
                "${image}:${{ needs.prepare.outputs.tag }}-amd64" \
                "${image}:${{ needs.prepare.outputs.tag }}-arm64"
            fi
          done

  release-manifest:
    name: release manifest
    runs-on: ubuntu-latest
    needs:
      - prepare
      - api-image
      - sandbox-runtime-manifests
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: write manifest
        run: ./scripts/release/write-manifest.sh "${{ needs.prepare.outputs.tag }}" release-manifest.json "${{ needs.prepare.outputs.commit }}"

      - name: upload manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.prepare.outputs.tag }}" release-manifest.json --clobber

  promote-sandbox-release:
    name: promote sandbox release
    needs:
      - prepare
      - release-manifest
    if: needs.prepare.outputs.prerelease != 'true'
    uses: ./.github/workflows/promote-sandbox-release.yml
    concurrency:
      group: release-promotion-production
      cancel-in-progress: false
    with:
      tag: ${{ needs.prepare.outputs.tag }}
      size: all
      runtime: true
      specialist: true
    secrets: inherit

  update-railway-runtime-config:
    name: update Railway runtime config
    runs-on: ubuntu-latest
    needs:
      - prepare
      - promote-sandbox-release
    if: needs.prepare.outputs.prerelease != 'true'
    concurrency:
      group: release-railway-production
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT: production
      RAILWAY_SERVICES: api.usehivy.com asynq.usehivy.com admin.api.usehivy.com
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: install Railway CLI
        run: npm install -g @railway/cli

      - name: download release manifest
        run: |
          mkdir -p "${RUNNER_TEMP}/release"
          gh release download "${{ needs.prepare.outputs.tag }}" \
            --pattern release-manifest.json \
            --dir "${RUNNER_TEMP}/release" \
            --clobber

      - name: update Railway runtime config
        run: ./scripts/release/update-railway-runtime-config.sh "${RUNNER_TEMP}/release/release-manifest.json"
