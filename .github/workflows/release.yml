name: release

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  prepare:
    name: prepare release version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.RELEASE_TAG }}
      version: ${{ steps.version.outputs.RELEASE_VERSION }}
      dashed: ${{ steps.version.outputs.RELEASE_DASHED }}
      prerelease: ${{ steps.version.outputs.RELEASE_IS_PRERELEASE }}
      commit: ${{ steps.version.outputs.RELEASE_COMMIT }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: derive version
        id: version
        run: ./scripts/release/derive-version.sh "${{ github.event.release.tag_name }}" "$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: verify release commit is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main

  api-image:
    name: api image
    runs-on: ubuntu-24.04-arm
    needs: prepare
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v4

      - name: login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: image tags
        id: tags
        shell: bash
        run: |
          tags="ghcr.io/usehivy/hivy:${{ needs.prepare.outputs.tag }}"
          tags="${tags},ghcr.io/usehivy/hivy:${{ needs.prepare.outputs.version }}"
          if [[ "${{ needs.prepare.outputs.prerelease }}" != "true" ]]; then
            tags="${tags},ghcr.io/usehivy/hivy:latest"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.tag }}
            COMMIT=${{ needs.prepare.outputs.commit }}
          labels: |
            org.opencontainers.image.source=https://github.com/usehivy/hivy
            org.opencontainers.image.revision=${{ needs.prepare.outputs.commit }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bridge-release-assets:
    name: bridge asset (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: bridge-release-${{ matrix.target }}
          workspaces: sandboxes/runtime -> target

      - name: build release binary
        working-directory: sandboxes/runtime
        run: cargo build --release --locked -p bridge --target ${{ matrix.target }}

      - name: package artifact
        working-directory: sandboxes/runtime
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/bridge"
          archive="bridge-${{ needs.prepare.outputs.tag }}-${{ matrix.target }}.tar.gz"
          tar czf "$archive" -C "$(dirname "$bin")" "$(basename "$bin")"
          echo "ARCHIVE=sandboxes/runtime/$archive" >> "$GITHUB_ENV"

      - name: upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.prepare.outputs.tag }}" "${{ env.ARCHIVE }}" --clobber

  sandbox-bridge-image:
    name: sandbox bridge image
    runs-on: ubuntu-latest
    needs:
      - prepare
      - bridge-release-assets
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.10"
          cache: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: sandbox-bridge-image
          workspaces: sandboxes/runtime -> target

      - name: build bridge binary
        working-directory: sandboxes/runtime
        run: cargo build --release --locked -p bridge

      - name: build and push sandbox bridge image
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          go run ./cmd/buildtemplates bridge \
            -version="${{ needs.prepare.outputs.tag }}" \
            -bridge-version="${{ needs.prepare.outputs.tag }}" \
            -bridge-binary=sandboxes/runtime/target/release/bridge \
            -size=all \
            -register-snapshots=false \
            -latest=${{ needs.prepare.outputs.prerelease != 'true' }}

  employee-sandbox-image:
    name: employee sandbox image
    runs-on: ubuntu-latest
    needs: prepare
    env:
      IMAGE_NAME: ghcr.io/usehivy/employee-sandbox
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: employee-sandbox-release-${{ runner.os }}-${{ hashFiles('sandboxes/employee/Cargo.lock') }}
          workspaces: sandboxes/employee -> target

      - name: build production binary
        working-directory: sandboxes/employee
        run: cargo build --release --locked -p employee-bridge

      - name: set image tags
        id: tags
        shell: bash
        run: |
          tags="${IMAGE_NAME}:${{ needs.prepare.outputs.tag }}"
          tags="${tags},${IMAGE_NAME}:${{ needs.prepare.outputs.version }}"
          if [[ "${{ needs.prepare.outputs.prerelease }}" != "true" ]]; then
            tags="${tags},${IMAGE_NAME}:latest"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: prepare Docker build context
        run: cp sandboxes/employee/target/release/employee-bridge sandboxes/employee/employee-bridge

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push runtime image
        uses: docker/build-push-action@v7
        with:
          context: sandboxes/employee
          file: sandboxes/employee/Dockerfile.runtime
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.tag }}
            COMMIT=${{ needs.prepare.outputs.commit }}
          labels: |
            org.opencontainers.image.source=https://github.com/usehivy/hivy
            org.opencontainers.image.revision=${{ needs.prepare.outputs.commit }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.tag }}

  release-manifest:
    name: release manifest
    runs-on: ubuntu-latest
    needs:
      - prepare
      - api-image
      - bridge-release-assets
      - sandbox-bridge-image
      - employee-sandbox-image
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: write manifest
        run: ./scripts/release/write-manifest.sh "${{ needs.prepare.outputs.tag }}" release-manifest.json "${{ needs.prepare.outputs.commit }}"

      - name: upload manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.prepare.outputs.tag }}" release-manifest.json --clobber

  promote-sandbox-release:
    name: promote sandbox release
    needs:
      - prepare
      - release-manifest
    if: needs.prepare.outputs.prerelease != 'true'
    uses: ./.github/workflows/promote-sandbox-release.yml
    concurrency:
      group: release-promotion-production
      cancel-in-progress: false
    with:
      tag: ${{ needs.prepare.outputs.tag }}
      size: all
      runtime: true
      employee: true
    secrets: inherit

  update-railway-runtime-config:
    name: update Railway runtime config
    runs-on: ubuntu-latest
    needs:
      - prepare
      - promote-sandbox-release
    if: needs.prepare.outputs.prerelease != 'true'
    concurrency:
      group: release-railway-production
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT: production
      RAILWAY_SERVICES: api.usehivy.com asynq.usehivy.com admin.api.usehivy.com
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: install Railway CLI
        run: npm install -g @railway/cli

      - name: download release manifest
        run: |
          mkdir -p "${RUNNER_TEMP}/release"
          gh release download "${{ needs.prepare.outputs.tag }}" \
            --pattern release-manifest.json \
            --dir "${RUNNER_TEMP}/release" \
            --clobber

      - name: update Railway runtime config
        run: ./scripts/release/update-railway-runtime-config.sh "${RUNNER_TEMP}/release/release-manifest.json"
