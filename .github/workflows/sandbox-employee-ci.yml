name: sandbox-employee-ci

on:
  push:
    branches: [main]
    paths:
      - "sandboxes/employee/**"
      - ".github/workflows/sandbox-employee-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "sandboxes/employee/**"
      - ".github/workflows/sandbox-employee-ci.yml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: sandboxes/employee

jobs:
  fmt:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: check formatting
        run: cargo fmt --all --check

  build:
    name: build workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: sandbox-employee-${{ runner.os }}-${{ hashFiles('sandboxes/employee/Cargo.lock') }}
          workspaces: sandboxes/employee -> target
      - name: build all targets
        run: cargo build --workspace --all-targets --locked

  test:
    name: test (${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: core
            command: cargo test --locked -p domain -p observability -p gateway -p mcp -p skills -p outbound
          - shard: storage-tools
            command: cargo test --locked -p storage -p tools
          - shard: agent-api
            command: cargo test --locked -p agent -p api
          - shard: bridge
            command: cargo test --locked -p employee-bridge -p eval-harness
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: sandbox-employee-${{ runner.os }}-${{ hashFiles('sandboxes/employee/Cargo.lock') }}
          workspaces: sandboxes/employee -> target
      - name: run shard
        run: ${{ matrix.command }}
