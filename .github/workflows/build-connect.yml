name: build-connect

on:
  push:
    branches: [main]
    paths:
      - 'apps/connect/**'
  pull_request:
    paths:
      - 'apps/connect/**'

concurrency:
  group: build-connect-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/connect/package-lock.json

      - name: install dependencies
        working-directory: apps/connect
        run: npm ci

      - name: lint
        working-directory: apps/connect
        run: npm run lint

      - name: build
        working-directory: apps/connect
        run: npm run build
