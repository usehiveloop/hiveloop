name: types-connect

on:
  push:
    branches: [main]
    paths:
      - "apps/connect/**"
  pull_request:
    paths:
      - "apps/connect/**"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/connect/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/connect

      - name: Typecheck
        run: npx tsc -b
        working-directory: apps/connect
