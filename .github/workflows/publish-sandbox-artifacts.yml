name: publish-sandbox-artifacts

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  bridge-release-assets:
    name: bridge asset (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: bridge-release-${{ matrix.target }}
          workspaces: sandboxes/runtime -> target

      - name: build release binary
        working-directory: sandboxes/runtime
        run: cargo build --release --locked -p bridge --target ${{ matrix.target }}

      - name: package artifact
        working-directory: sandboxes/runtime
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/bridge"
          archive="bridge-${{ github.event.release.tag_name }}-${{ matrix.target }}.tar.gz"
          tar czf "$archive" -C "$(dirname "$bin")" "$(basename "$bin")"
          echo "ARCHIVE=sandboxes/runtime/$archive" >> "$GITHUB_ENV"

      - name: upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ env.ARCHIVE }}" --clobber

  sandbox-bridge-image:
    name: sandbox bridge image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: sandbox-bridge-image
          workspaces: sandboxes/runtime -> target

      - name: build bridge binary
        working-directory: sandboxes/runtime
        run: cargo build --release --locked -p bridge

      - name: release settings
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            echo "latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "latest=true" >> "$GITHUB_OUTPUT"
          fi

      - name: build and push sandbox bridge image
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          go run ./cmd/buildtemplates bridge \
            -version="$version" \
            -bridge-version="$tag" \
            -bridge-binary=sandboxes/runtime/target/release/bridge \
            -size=all \
            -register-snapshots=false \
            -latest=${{ steps.release.outputs.latest }}

  employee-sandbox-image:
    name: employee sandbox image
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/usehiveloop/employee-sandbox
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: employee-sandbox-release-${{ runner.os }}-${{ hashFiles('sandboxes/employee/Cargo.lock') }}
          workspaces: sandboxes/employee -> target

      - name: build production binary
        working-directory: sandboxes/employee
        run: cargo build --release --locked -p employee-bridge

      - name: set image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          semver="${tag#v}"
          if [[ ! "$semver" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "release tag must be semantic versioned, got: ${tag}" >&2
            exit 1
          fi

          tags="${IMAGE_NAME}:${tag}"
          if [[ "$semver" != "$tag" ]]; then
            tags="${tags},${IMAGE_NAME}:${semver}"
          fi

          if [[ "${{ github.event.release.prerelease }}" != "true" ]]; then
            tags="${tags},${IMAGE_NAME}:latest"
          fi

          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: prepare Docker build context
        run: cp sandboxes/employee/target/release/employee-bridge sandboxes/employee/employee-bridge

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: sandboxes/employee
          file: sandboxes/employee/Dockerfile.runtime
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
