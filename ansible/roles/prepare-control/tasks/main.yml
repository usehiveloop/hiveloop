---
# Control plane VPS preparation (runs after base role)

# --- Firewall: open HTTP/HTTPS for API + proxy traffic ---
- name: Allow HTTP
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Allow SSH Gateway port
  ufw:
    rule: allow
    port: "2222"
    proto: tcp

# --- Docker Compose project directory ---
- name: Create Daytona control plane directory
  file:
    path: /opt/daytona
    state: directory
    mode: "0755"

# --- Verification ---
- name: Verify Docker is running
  command: docker info
  register: docker_info
  changed_when: false

- name: Verify Docker Compose available
  command: docker compose version
  register: compose_version
  changed_when: false

- name: Print verification summary
  debug:
    msg:
      - "Host: {{ inventory_hostname }} ({{ ansible_host }})"
      - "Docker: {{ 'OK' if docker_info.rc == 0 else 'FAILED' }}"
      - "Compose: {{ compose_version.stdout | default('NOT FOUND') }}"
