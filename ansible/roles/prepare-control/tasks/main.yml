---
# Control plane VPS preparation (runs after base role)

# --- Firewall: open HTTP/HTTPS for API + proxy traffic ---
- name: Allow HTTP
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Allow SSH Gateway port
  ufw:
    rule: allow
    port: "2222"
    proto: tcp

- name: Allow DNS (acme-dns) UDP
  ufw:
    rule: allow
    port: "53"
    proto: udp

- name: Allow DNS (acme-dns) TCP
  ufw:
    rule: allow
    port: "53"
    proto: tcp

# Disable systemd-resolved stub listener to free port 53 for acme-dns
- name: Disable systemd-resolved stub listener
  lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^#?DNSStubListener='
    line: 'DNSStubListener=no'
  register: resolved_changed

- name: Set DNS server in resolved.conf
  lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^#?DNS='
    line: 'DNS=1.1.1.1'
  register: dns_changed

- name: Fix resolv.conf symlink
  file:
    src: /run/systemd/resolve/resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true
  when: resolved_changed.changed or dns_changed.changed

- name: Restart systemd-resolved
  systemd:
    name: systemd-resolved
    state: restarted
  when: resolved_changed.changed or dns_changed.changed

# --- Docker Compose project directory ---
- name: Create Daytona control plane directory
  file:
    path: /opt/daytona
    state: directory
    mode: "0755"

# --- Verification ---
- name: Verify Docker is running
  command: docker info
  register: docker_info
  changed_when: false

- name: Verify Docker Compose available
  command: docker compose version
  register: compose_version
  changed_when: false

- name: Print verification summary
  debug:
    msg:
      - "Host: {{ inventory_hostname }} ({{ ansible_host }})"
      - "Docker: {{ 'OK' if docker_info.rc == 0 else 'FAILED' }}"
      - "Compose: {{ compose_version.stdout | default('NOT FOUND') }}"
