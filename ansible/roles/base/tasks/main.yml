---
# Shared base setup for all machines (runners + control plane)

# --- Clean up conflicting Docker repo entries (must run before any apt call) ---
- name: Remove conflicting Docker repo entries
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/docker.list
    - /etc/apt/sources.list.d/docker.sources
    - /usr/share/keyrings/docker-archive-keyring.gpg

# --- System Updates ---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade all packages
  apt:
    upgrade: dist
    autoremove: true

- name: Install prerequisite packages
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - wget
      - gnupg
      - lsb-release
      - software-properties-common
      - ufw
      - fail2ban
      - jq
      - htop
      - iotop
      - net-tools
      - unzip
    state: present

# --- fail2ban ---
- name: Enable and start fail2ban
  systemd:
    name: fail2ban
    enabled: true
    state: started

# --- Timezone ---
- name: Set timezone to UTC
  timezone:
    name: UTC

# --- Docker CE ---
- name: Ensure /etc/apt/keyrings exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  shell: |
    curl -fsSL {{ docker_gpg_url }} -o /etc/apt/keyrings/docker.asc
    chmod a+r /etc/apt/keyrings/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.asc

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    state: present
    filename: docker

- name: Install Docker CE
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Configure Docker daemon
  template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: "0644"
  notify: Restart Docker

- name: Enable and start Docker
  systemd:
    name: docker
    enabled: true
    state: started

# --- Kernel Tuning ---
- name: Apply sysctl parameters
  template:
    src: sysctl-daytona.conf.j2
    dest: /etc/sysctl.d/99-daytona.conf
    mode: "0644"
  notify: Reload sysctl

- name: Apply sysctl immediately
  command: sysctl -p /etc/sysctl.d/99-daytona.conf
  changed_when: false

# --- Ulimits ---
- name: Configure ulimits
  template:
    src: limits-daytona.conf.j2
    dest: /etc/security/limits.d/99-daytona.conf
    mode: "0644"

# --- Firewall Base ---
- name: Set UFW default deny incoming
  ufw:
    direction: incoming
    policy: deny

- name: Set UFW default allow outgoing
  ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled
