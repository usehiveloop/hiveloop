---
# Phase 3: Deploy Daytona runners on bare metal machines
#
# Usage:
#   source .env && ansible-playbook phase3-deploy-runners.yml
#
# Prerequisites:
#   - Phase 1 + Phase 2 completed
#   - .env sourced with all secrets
#   - API healthy at https://api.daytona.llmvault.dev

- name: "Phase 3: Deploy Runners"
  hosts: runners
  become: true
  pre_tasks:
    - name: Verify required environment variables
      assert:
        that:
          - lookup('env', item) | length > 0
        fail_msg: "Environment variable {{ item }} is not set. Run: source .env"
      loop:
        - DAYTONA_RUNNER_API_KEY
        - DAYTONA_R2_ENDPOINT
        - DAYTONA_R2_ACCESS_KEY
        - DAYTONA_R2_SECRET_KEY
  roles:
    - deploy-runners
