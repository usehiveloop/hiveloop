root = "."
tmp_dir = "tmp/air-api"

[build]
  cmd = "CGO_ENABLED=0 /usr/local/go/bin/go build -o ./tmp/air-api/hivy ./cmd/server"
  bin = "./tmp/air-api/hivy"
  full_bin = "./tmp/air-api/hivy serve"
  include_ext = ["go", "json", "yaml", "yml", "toml"]
  exclude_dir = ["tmp", "bin", "node_modules", "apps", "packages", "docs", "scripts", "docker", "examples", "marketing", "patches", "strix_runs", "certs", "sandboxes", "hosting", "services", "ansible", "venv", ".git", ".next"]
  exclude_regex = ["_test\\.go$"]
  delay = 1000
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
