# MCP server — mcp.hiveloop.com / mcp.dev.hiveloop.com
# Point these domains to the same Railway service as a custom domain.
# Nginx routes by Host header to the internal MCP server on :8081.
server {
    listen 80;
    server_name ~^mcp\.;
    server_tokens off;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming — disable all buffering
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;

        # MCP sessions can be long-lived
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# LLM proxy — proxy.hiveloop.com / proxy.dev.hiveloop.com
# Rewrites all requests with /v1/proxy/ prefix so customers can call
# POST /v1/chat/completions and it routes to the Go proxy handler.
server {
    listen 80;
    server_name ~^proxy\.;
    server_tokens off;

    client_max_body_size 100m;
    client_body_buffer_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8080/v1/proxy/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming — disable all buffering
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;

        # Long timeouts for slow models / large generations
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Large response headers (some providers return verbose headers)
        proxy_buffers 8 16k;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 64k;
    }

    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# API — api.usehiveloop.com / *.railway.internal / everything else
# Straight pass-through to Go API on :8080, no path rewriting.
server {
    listen 80 default_server;
    server_name _;
    server_tokens off;

    client_max_body_size 100m;
    client_body_buffer_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming — disable all buffering
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;

        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        proxy_buffers 8 16k;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 64k;
    }

    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
