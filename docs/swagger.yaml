  /incoming/triggers/{triggerID}:
    post:
      consumes:
      - application/json
      description: 'Receives an HTTP request and dispatches it to the owning employee
        runtime for the specified trigger. The trigger UUID acts as a bearer token.
        If the trigger has a shared secret configured, the request must include the
        plaintext secret in any of: Authorization: Bearer <secret>, X-Api-Key, X-Webhook-Secret,
        or ?secret=<secret>.'
      parameters:
      - description: Trigger UUID
        in: path
        name: triggerID
        required: true
        type: string
      - description: Bearer <secret>. One of the accepted ways to send the trigger's
          shared secret.
        in: header
        name: Authorization
        type: string
      - description: Plaintext shared secret. One of the accepted auth header names.
        in: header
        name: X-Api-Key
        type: string
      - description: Plaintext shared secret. One of the accepted auth header names.
        in: header
        name: X-Webhook-Secret
        type: string
      - description: Plaintext shared secret as a query param. Last-resort transport
          when headers can't be customized.
        in: query
        name: secret
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.statusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Missing or invalid shared secret
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      summary: Receive HTTP trigger request
      tags:
      - triggers
