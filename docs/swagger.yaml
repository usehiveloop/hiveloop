      consumes:
      - application/json
      description: Sends a message to the agent in the conversation. Returns 202 immediately;
        response streams via SSE.
      parameters:
      - description: Conversation ID
        in: path
        name: convID
        required: true
        type: string
      - description: Message content
        in: body
