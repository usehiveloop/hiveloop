host: api.dev.usehivy.com
info:
  contact: {}
  description: Proxy bridge for LLM API credentials.
  title: Hivy API
  version: "1.0"
paths:
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Changes the authenticated user's password. Revokes all sessions.
      parameters:
      - description: Current and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/changePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/statusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errorResponse'
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - auth
  /auth/confirm-email:
    post:
      consumes:
      - application/json
      description: Confirms a user's email address using a 6-digit code.
      parameters:
      - description: Email and 6-digit code
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/confirmEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/statusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
      summary: Confirm email address
      tags:
      - auth
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Sends a password reset link to the email address if an account
        exists.
      parameters:
      - description: Email address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/forgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/statusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
      summary: Request password reset
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user with email and password.
      parameters:
      - description: Login parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errorResponse'
      summary: Log in
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes a refresh token.
      parameters:
      - description: Logout parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/logoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/statusResponse'
      security:
      - BearerAuth: []
      summary: Log out
      tags:
      - auth
  /auth/me:
    get:
      description: Returns the current user and their organization memberships.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/meResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /auth/otp/request:
    post:
      consumes:
      - application/json
      description: Sends a 6-digit one-time code to the given email address.
      parameters:
      - description: OTP request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/otpRequestPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errorResponse'
      summary: Request an OTP code
      tags:
      - auth
  /auth/otp/verify:
    post:
      consumes:
      - application/json
      description: Verifies the 6-digit code and returns access/refresh tokens. Creates
        the user account if it doesn't exist.
      parameters:
      - description: OTP verification
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/otpVerifyPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errorResponse'
      summary: Verify an OTP code
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a refresh token for new access and refresh tokens.
      parameters:
      - description: Refresh parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errorResponse'
      summary: Refresh tokens
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a user account with email and password.
      parameters:
      - description: Registration parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errorResponse'
      summary: Register
      tags:
      - auth
  /auth/resend-confirmation:
    post:
      consumes:
      - application/json
      description: Sends a new 6-digit email confirmation code. Rate limited to 1
        per 60 seconds.
      parameters:
      - description: Email address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/resendConfirmationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/statusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/errorResponse'
      summary: Resend confirmation email
      tags:
      - auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Resets a user's password using a reset token. Revokes all sessions.
      parameters:
      - description: Reset token and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/resetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/statusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
      summary: Reset password
      tags:
      - auth
  /incoming/triggers/{triggerID}:
    post:
      consumes:
      - application/json
      description: 'Receives an HTTP request and dispatches it to the owning employee
        runtime for the specified trigger. The trigger UUID acts as a bearer token.
        If the trigger has a shared secret configured, the request must include the
        plaintext secret in any of: Authorization: Bearer <secret>, X-Api-Key, X-Webhook-Secret,
        or ?secret=<secret>.'
      parameters:
      - description: Trigger UUID
        in: path
        name: triggerID
        required: true
        type: string
      - description: Bearer <secret>. One of the accepted ways to send the trigger's
          shared secret.
        in: header
        name: Authorization
        type: string
      - description: Plaintext shared secret. One of the accepted auth header names.
        in: header
        name: X-Api-Key
        type: string
      - description: Plaintext shared secret. One of the accepted auth header names.
        in: header
        name: X-Webhook-Secret
        type: string
      - description: Plaintext shared secret as a query param. Last-resort transport
          when headers can't be customized.
        in: query
        name: secret
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/statusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
        "401":
          description: Missing or invalid shared secret
          schema:
            $ref: '#/definitions/errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errorResponse'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/errorResponse'
      summary: Receive HTTP trigger request
      tags:
      - triggers
  /incoming/webhooks/{provider}/{connectionID}:
    post:
      consumes:
      - application/json
      description: Receives webhook events directly from providers that require manual
        webhook URL configuration (e.g. Railway). The connection UUID in the URL identifies
        the org and connection.
      parameters:
      - description: Provider name (e.g. railway)
        in: path
        name: provider
        required: true
        type: string
      - description: Connection UUID
        in: path
        name: connectionID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errorResponse'
      summary: Receive incoming webhook from external provider
      tags:
      - webhooks
  /oauth/exchange:
    post:
      consumes:
      - application/json
      description: Exchanges a short-lived, single-use OAuth exchange token for an
        access/refresh token pair. The exchange token is obtained from the OAuth callback
        redirect.
      parameters:
      - description: Exchange token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/exchangeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errorResponse'
      summary: Exchange OAuth token for access and refresh tokens
      tags:
      - oauth
  /oauth/github:
    get:
      description: Redirects the browser to GitHub's authorization page. Sets a state
        cookie for CSRF protection.
      responses:
        "307":
          description: Redirect to GitHub
        "404":
          description: Provider not configured
          schema:
            $ref: '#/definitions/errorResponse'
      summary: Start GitHub OAuth login
      tags:
      - oauth
  /oauth/github/callback:
    get:
      description: Handles the redirect from GitHub after authorization. Exchanges
        the code for a token, creates or links the user account, and redirects to
        the frontend with a short-lived exchange token.
      parameters:
      - description: Authorization code from GitHub
        in: query
        name: code
        required: true
        type: string
      - description: CSRF state parameter
        in: query
        name: state
        required: true
        type: string
      responses:
        "307":
          description: Redirect to frontend with error
      summary: GitHub OAuth callback
      tags:
      - oauth
  /oauth/google:
    get:
      description: Redirects the browser to Google's authorization page. Sets a state
        cookie for CSRF protection.
      responses:
        "307":
          description: Redirect to Google
        "404":
          description: Provider not configured
          schema:
            $ref: '#/definitions/errorResponse'
      summary: Start Google OAuth login
      tags:
      - oauth
  /oauth/google/callback:
    get:
      description: Handles the redirect from Google after authorization. Exchanges
        the code for a token, creates or links the user account, and redirects to
        the frontend with a short-lived exchange token.
      parameters:
      - description: Authorization code from Google
        in: query
        name: code
        required: true
        type: string
      - description: CSRF state parameter
        in: query
        name: state
        required: true
        type: string
      responses:
        "307":
          description: Redirect to frontend with error
      summary: Google OAuth callback
      tags:
      - oauth
  /oauth/x:
    get:
      description: Redirects the browser to X's authorization page. Sets state and
        PKCE verifier cookies.
      responses:
        "307":
          description: Redirect to X
        "404":
          description: Provider not configured
          schema:
            $ref: '#/definitions/errorResponse'
      summary: Start X (Twitter) OAuth login
      tags:
      - oauth
  /oauth/x/callback:
    get:
      description: Handles the redirect from X after authorization. Exchanges the
        code for a token using PKCE, creates or links the user account, and redirects
        to the frontend with a short-lived exchange token.
      parameters:
      - description: Authorization code from X
        in: query
        name: code
        required: true
        type: string
      - description: CSRF state parameter
        in: query
        name: state
        required: true
        type: string
      responses:
        "307":
          description: Redirect to frontend with error
      summary: X (Twitter) OAuth callback
      tags:
      - oauth
  /v1/api-keys:
    get:
      description: Returns API keys for the current organization with cursor pagination.
      parameters:
      - description: Max items per page (1-100, default 50)
        in: query
        name: limit
        type: integer
      - description: Pagination cursor from previous response
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/paginatedResponse-handler_apiKeyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errorResponse'
      security:
      - BearerAuth: []
      summary: List API keys
      tags:
      - api-keys
    post:
      consumes:
      - application/json
      description: Creates a new API key for the current organization. The plaintext
        key is returned once.
      parameters:
      - description: API key parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/createAPIKeyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/createAPIKeyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errorResponse'
      security:
      - BearerAuth: []
      summary: Create an API key
      tags:
      - api-keys
  /v1/api-keys/{id}:
    delete:
      description: Soft-deletes an API key by setting its revoked_at timestamp.
      parameters:
      - description: API Key ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errorResponse'
      security:
      - BearerAuth: []
      summary: Revoke an API key
      tags:
      - api-keys
  /v1/assets:
    get:
      description: 'Lists conversation assets owned by the caller''s org. Optional
        filters: employee_id, conversation_id, path. Ordered by created_at desc, cursor-paginated.'
      parameters:
      - description: Filter to assets uploaded inside conversations of this employee
        in: query
        name: employee_id
        type: string
      - description: Filter to assets uploaded inside this conversation
        in: query
        name: conversation_id
        type: string
      - description: Filter by exact folder label (empty = root)
        in: query
        name: path
        type: string
      - description: Page size (default 50, max 200)
        in: query
        name: limit
        type: integer
      - description: Pagination cursor — created_at unix-nanos from the previous page's
          tail
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/paginatedResponse-handler_assetListItem'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errorResponse'
      security:
      - BearerAuth: []
      summary: List org assets
      tags:
      - assets
  /v1/audit:
    get:
      description: Returns audit log entries for the current organization with cursor
        pagination. Cursor is the last-seen entry ID.
      parameters:
      - description: Max items per page (1-100, default 50)
        in: query
        name: limit
        type: integer
      - description: Pagination cursor (entry ID) from previous response
        in: query
        name: cursor
        type: string
      - description: Filter by action (e.g. proxy.request, api.request)
        in: query
        name: action
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/paginatedResponse-handler_auditEntryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errorResponse'
      security:
      - BearerAuth: []
      summary: List audit log entries
      tags:
      - audit
  /v1/billing/checkout:
    post:
      consumes:
      - application/json
      description: Creates a checkout session for subscribing to a plan. The client
        chooses the provider.
      parameters:
      - description: Checkout request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/createCheckoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/createCheckoutResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errorResponse'
      security:
