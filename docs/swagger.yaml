host: api.dev.hiveloop.com
info:
  contact: {}
  description: Proxy bridge for LLM API credentials.
  title: HiveLoop API
  version: "1.0"
paths:
  /admin/v1/admin-audit:
    get:
      description: Returns mutating operations performed via the admin API. Payloads
        are sanitized — sensitive fields are masked at write time.
      parameters:
      - description: Filter by resource (users, orgs, credentials, ...)
        in: query
        name: resource
        type: string
      - description: Filter by action
        in: query
        name: action
        type: string
      - description: Filter by admin user ID
        in: query
        name: admin_id
        type: string
      - description: Page size (max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List admin audit entries
      tags:
      - admin
  /admin/v1/agents:
    get:
      description: Returns agents across all organizations.
      parameters:
      - description: Filter by org ID
        in: query
        name: org_id
        type: string
      - description: Filter by status (active, archived)
        in: query
        name: status
        type: string
      - description: Page size
        in: query
        name: limit
        type: integer
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.paginatedResponse-internal_handler_adminAgentResponse'
      security:
      - BearerAuth: []
      summary: List all agents
      tags:
      - admin
  /admin/v1/agents/{id}:
    delete:
      description: Permanently deletes an agent.
      parameters:
      - description: Agent ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Delete an agent
      tags:
      - admin
    get:
      description: Returns agent details.
      parameters:
      - description: Agent ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.adminAgentResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Get agent details
      tags:
      - admin
    put:
      consumes:
      - application/json
      description: Updates agent configuration with full validation.
      parameters:
      - description: Agent ID
        in: path
        name: id
        required: true
