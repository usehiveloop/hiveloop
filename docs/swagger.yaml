  /v1/conversations/{convID}/events:
    get:
      description: Returns webhook events persisted for the conversation, ordered
        by sequence_number DESC (newest first). Pagination cursor is the lowest sequence_number
        on the current page; pass it back to fetch the next older page. Filterable
        by event type.
      parameters:
      - description: Conversation ID
        in: path
        name: convID
        required: true
        type: string
      - description: Filter by event type (e.g. message_received, response_completed)
        in: query
        name: type
        type: string
      - description: Page size (default 50, max 100)
        in: query
        name: limit
        type: integer
      - description: Pagination cursor — sequence_number from previous page's tail.
          Returns events with sequence_number strictly less than this value.
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.paginatedResponse-internal_handler_conversationEventResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: List conversation events
      tags:
      - conversations
  /v1/conversations/{convID}/history:
    get:
      description: Returns persisted conversation events in chronological order, intended
        for hydrating a UI before opening the SSE stream. Paginated via since=<event_id>.
        Unlike GET /events, this endpoint sorts events ASC by sequence_number so the
        caller can render in order.
      parameters:
      - description: Conversation ID
        in: path
        name: convID
        required: true
        type: string
      - description: Return events with sequence_number greater than this event_id
        in: query
        name: since
        type: string
      - description: Page size (default 200, max 1000)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.conversationHistoryResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Hydrate conversation history
      tags:
      - conversations
  /v1/conversations/{convID}/messages:
    get:
      description: Returns chat-ready messages aggregated from raw events. Consecutive
        same-name tool calls are grouped (e.g. "bash" called 11 times in a row → one
        group with 11 calls). Pagination is by sequence_number; aggregation is per-page
        so a tool call split across pages will not pair.
      parameters:
      - description: Conversation ID
        in: path
        name: convID
        required: true
        type: string
      - description: Max events scanned per page (default 200, max 1000). Aggregated
          message count may be smaller.
        in: query
        name: limit
        type: integer
      - description: Sequence number from the previous page's tail. Returns events
          with sequence_number strictly greater than this value.
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.conversationMessagesResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: List conversation messages
      tags:
      - conversations
