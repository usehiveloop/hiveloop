      description: Marks an invite as revoked. Admin-only. Already-accepted invites
        cannot be revoked.
      parameters:
      - description: Invite ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/errorResponse'
      security:
      - BearerAuth: []
      summary: Revoke a pending invitation
      tags:
      - org-invites
  /v1/orgs/current/invites/{id}/resend:
    post:
      description: Generates a new token and re-sends the invite email. Admin-only.
      parameters:
      - description: Invite ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/orgInviteResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/errorResponse'
      security:
      - BearerAuth: []
      summary: Resend an invitation
      tags:
      - org-invites
  /v1/orgs/current/members:
    get:
      description: Returns every user with an active membership in the current org.
        Any member may call this.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/listOrgMembersResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errorResponse'
      security:
      - BearerAuth: []
      summary: List members of the current organization
      tags:
      - org-invites
  /v1/plans:
    get:
      description: |-
        Returns the public catalog of billing plans, ordered by price
        ascending (free first). Public — no authentication required.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/planDTO'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errorResponse'
      summary: List all active plans
      tags:
      - plans
  /v1/providers:
    get:
      description: Returns every provider in the catalog with a model count.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/providerSummary'
            type: array
      summary: List all providers
      tags:
      - providers
  /v1/providers/{id}:
    get:
      description: Returns a single provider with its full model list.
      parameters:
      - description: Provider ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/providerDetail'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errorResponse'
      summary: Get provider detail
      tags:
      - providers
  /v1/providers/{id}/models:
    get:
      description: Returns the model catalog for a single provider.
      parameters:
      - description: Provider ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/modelSummary'
            type: array
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errorResponse'
      summary: List models for a provider
      tags:
      - providers
  /v1/rag/integrations:
    get:
      description: Returns the platform integrations that can be used as RAG sources
        (i.e. their `supports_rag_source` flag is true). The admin UI uses this to
        filter the connection picker for the Knowledge Base.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ragIntegrationsListResponse'
      security:
      - BearerAuth: []
      summary: List RAG-supported integrations
      tags:
      - rag
  /v1/rag/search:
    post:
      consumes:
      - application/json
      description: Hybrid retrieval against the org's RAG dataset, optionally reranked.
      parameters:
      - description: Search query
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/ragSearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ragSearchResponse'
      security:
      - BearerAuth: []
      summary: Search the knowledge base
      tags:
      - rag
  /v1/rag/sources:
    get:
      description: Returns the org's RAG sources. Supports pagination and optional
        status / kind filters.
      parameters:
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by kind
        in: query
        name: kind
        type: string
      - description: Page number (0-indexed)
        in: query
        name: page
        type: integer
      - description: Page size, max 100
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ragListResponse'
      security:
      - BearerAuth: []
      summary: List RAG sources
      tags:
      - rag
    post:
      consumes:
      - application/json
      description: Creates a new RAG source that the scheduler will pick up on the
        next tick. Kind=integration requires a valid in_connection_id pointing at
        an integration whose supports_rag_source flag is true. Refresh / prune / perm-sync
        frequencies are validated against per-org minimums.
      parameters:
      - description: Source definition
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/createRAGSourceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/ragSourceResponse'
      security:
      - BearerAuth: []
      summary: Create a RAG source
      tags:
      - rag
  /v1/rag/sources/{id}:
    delete:
      description: Hard-deletes the source row. Postgres-side rows (attempts, documents,
        sync state, ACLs) cascade. Vector store entries are reaped later by the prune
        loop.
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Delete a RAG source
      tags:
      - rag
    get:
      description: Returns one RAG source by ID with the last 5 index attempts inlined.
        404 on cross-org access by design.
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ragSourceDetailResponse'
      security:
      - BearerAuth: []
      summary: Get a RAG source
      tags:
      - rag
    patch:
      consumes:
      - application/json
      description: Patches mutable fields (name, status pause/resume, refresh / prune
        / perm-sync frequencies, indexing_start floor). Only ACTIVE ↔ PAUSED transitions
        are client-settable; DELETING is server-managed.
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      - description: Patch payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/updateRAGSourceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ragSourceResponse'
      security:
      - BearerAuth: []
      summary: Update a RAG source
      tags:
      - rag
  /v1/rag/sources/{id}/attempts:
    get:
      description: Paginated, most-recent-first. Each row covers one ingest / perm-sync
        / prune attempt with status, doc counts, and error summary.
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      - description: Page number (0-indexed)
        in: query
        name: page
        type: integer
      - description: Page size, max 100
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ragAttemptsListResponse'
      security:
      - BearerAuth: []
      summary: List index attempts for a RAG source
      tags:
      - rag
  /v1/rag/sources/{id}/attempts/{attempt_id}:
    get:
      description: Returns the attempt's status / counts / window plus the first page
        of per-doc failure rows. The specialist errors page can be used to walk later
        pages if needed.
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      - description: Attempt ID
        in: path
        name: attempt_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ragAttemptDetailResponse'
      security:
      - BearerAuth: []
      summary: Get an index-attempt with per-doc errors
      tags:
      - rag
  /v1/rag/sources/{id}/perm-sync:
    post:
      description: Enqueues a one-off permission-sync job. Returns 422 if the source's
        connector does not implement PermSyncConnector (i.e. has no external ACL model
        worth syncing).
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/triggerResponse'
      security:
      - BearerAuth: []
      summary: Trigger an immediate permission sync
      tags:
      - rag
  /v1/rag/sources/{id}/prune:
    post:
      description: 'Enqueues a one-off prune job: the connector enumerates upstream
        IDs and the worker deletes any documents we have that no longer exist upstream.'
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/triggerResponse'
      security:
      - BearerAuth: []
      summary: Trigger an immediate prune
      tags:
      - rag
  /v1/rag/sources/{id}/sync:
    post:
      consumes:
      - application/json
      description: Enqueues a one-off ingest job for the source. Set from_beginning=true
        to override the time-window floor and re-walk from the source's IndexingStart
        (or epoch).
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      - description: Trigger options
        in: body
        name: body
        schema:
          $ref: '#/definitions/syncTriggerRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/triggerResponse'
      security:
      - BearerAuth: []
      summary: Trigger an immediate ingest
      tags:
      - rag
  /v1/reporting:
    get:
      description: Returns aggregated analytics from generations with flexible grouping
        and filtering.
      parameters:
      - description: 'Comma-separated grouping dimensions: model, provider, credential,
          user'
        in: query
        name: group_by
        type: string
      - description: 'Time granularity: hour or day (default: day)'
        in: query
        name: date_part
        type: string
      - description: Start date inclusive (YYYY-MM-DD)
        in: query
        name: start_date
        type: string
      - description: End date inclusive (YYYY-MM-DD)
        in: query
        name: end_date
        type: string
      - description: Filter by model name
        in: query
        name: model
        type: string
      - description: Filter by provider ID
        in: query
        name: provider_id
        type: string
      - description: Filter by credential ID
        in: query
        name: credential_id
        type: string
      - description: Filter by user ID
        in: query
        name: user_id
        type: string
      - description: Filter by tag (comma-separated, OR)
        in: query
        name: tags
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/reportRow'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errorResponse'
      security:
      - BearerAuth: []
      summary: Get analytics report
      tags:
      - reporting
  /v1/sandbox-templates:
