      consumes:
      - application/json
      description: Updates metadata on an org-owned skill. Public skills are read-only.
      parameters:
      - description: Skill ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
