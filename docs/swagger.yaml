  /v1/skills/{id}:
    delete:
      description: Marks an org-owned skill as archived. Public skills cannot be deleted
        via this endpoint.
      parameters:
      - description: Skill ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
