      tags:
      - rag
  /v1/rag/sources/{id}:
    delete:
      description: Hard-deletes the source row. Postgres-side rows (attempts, documents,
        sync state, ACLs) cascade. Vector store entries are reaped later by the prune
        loop.
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Delete a RAG source
      tags:
      - rag
    get:
      description: Returns one RAG source by ID with the last 5 index attempts inlined.
        404 on cross-org access by design.
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.ragSourceDetailResponse'
      security:
      - BearerAuth: []
      summary: Get a RAG source
      tags:
      - rag
    patch:
      consumes:
      - application/json
      description: Patches mutable fields (name, status pause/resume, refresh / prune
        / perm-sync frequencies, indexing_start floor). Only ACTIVE ↔ PAUSED transitions
        are client-settable; DELETING is server-managed.
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      - description: Patch payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.updateRAGSourceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
