      - description: Skill ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Remove a skill from the public marketplace
      tags:
      - skills
    post:
      description: Clones an org-owned skill into a public skill (OrgID=nil) with
        a reference back to the original. The original skill gets a reference to the
        public clone.
      parameters:
      - description: Skill ID
        in: path
        name: id
        required: true
        type: string
