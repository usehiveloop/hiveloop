services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hiveloop}
      POSTGRES_USER: ${POSTGRES_USER:-hiveloop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hiveloop}"]
      interval: 2s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5

  # --- Qdrant (vector database for RAG dev/test) ---
  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_PORT:-6334}:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  # --- Hindsight (optional real-memory integration test runtime) ---
  # Start explicitly with: docker compose --profile hindsight up -d hindsight
  hindsight:
    image: ${HINDSIGHT_IMAGE:-ghcr.io/vectorize-io/hindsight:latest-slim}
    profiles: ["hindsight"]
    env_file:
      - .env.hindsight
    environment:
      HINDSIGHT_API_HOST: 0.0.0.0
      HINDSIGHT_API_PORT: ${HINDSIGHT_API_PORT:-8888}
      HINDSIGHT_API_DATABASE_URL: postgresql://${POSTGRES_USER:-hiveloop}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-hiveloop}
      HINDSIGHT_API_DATABASE_SCHEMA: ${HINDSIGHT_API_DATABASE_SCHEMA:-hindsight}
      HINDSIGHT_API_RUN_MIGRATIONS_ON_STARTUP: "true"
    ports:
      - "${HINDSIGHT_API_LOCAL_PORT:-8888}:${HINDSIGHT_API_PORT:-8888}"
    depends_on:
      postgres:
        condition: service_healthy

  # --- Mailpit (Email testing) ---
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    environment:
      MP_DATA_FILE: /data/mailpit.db
      MP_UI_BIND_ADDR: 0.0.0.0:8025
      MP_SMTP_BIND_ADDR: 0.0.0.0:1025
      MP_SMTP_AUTH_ACCEPT_ANY: true
      MP_SMTP_AUTH_ALLOW_INSECURE: true
    volumes:
      - mailpitdata:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/livez"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- MinIO (S3-compatible object storage for LanceDB + filestore in dev/test) ---
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 2s
      timeout: 5s
      retries: 15

  # --- One-shot bucket creator for MinIO ---
  # Creates the hiveloop-rag-test bucket the Phase 0 LanceDB spike and later
  # RAG integration tests use. Exits 0 once the bucket exists.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/hiveloop-rag-test &&
      mc mb --ignore-existing local/public-files-test &&
      mc anonymous set download local/public-files-test &&
      echo 'buckets ready'
      "
    restart: "no"

volumes:
  pgdata:
  mailpitdata:
  miniodata:
  qdrantdata:
