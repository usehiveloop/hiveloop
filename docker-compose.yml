services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-local}
    command: ["sh", "-c", "mkdir -p /workspace/tmp && /go/bin/air -c .air.api.toml"]
    env_file:
      - .env
    environment:
      HIVY_ENVIRONMENT: ${HIVY_ENVIRONMENT:-development}
      HIVY_PORT: "8080"
      HIVY_LOG_LEVEL: ${HIVY_LOG_LEVEL:-info}
      HIVY_LOG_FORMAT: ${HIVY_LOG_FORMAT:-text}
      HIVY_DATABASE_URL: ${HIVY_DATABASE_URL:-postgres://hivy:localdev@postgres:5432/hivy?sslmode=disable}
      HIVY_DB_HOST: ${HIVY_DB_HOST:-postgres}
      HIVY_DB_PORT: ${HIVY_DB_PORT:-5432}
      HIVY_DB_USER: ${HIVY_DB_USER:-hivy}
      HIVY_DB_PASSWORD: ${HIVY_DB_PASSWORD:-localdev}
      HIVY_DB_NAME: ${HIVY_DB_NAME:-hivy}
      HIVY_DB_SSLMODE: ${HIVY_DB_SSLMODE:-disable}
      HIVY_KMS_KEY: ${HIVY_KMS_KEY:?HIVY_KMS_KEY is required}
      HIVY_JWT_SIGNING_KEY: ${HIVY_JWT_SIGNING_KEY:?HIVY_JWT_SIGNING_KEY is required}
      HIVY_AUTH_RSA_PRIVATE_KEY: ${HIVY_AUTH_RSA_PRIVATE_KEY:?HIVY_AUTH_RSA_PRIVATE_KEY is required}
      HIVY_SANDBOX_ENCRYPTION_KEY: ${HIVY_SANDBOX_ENCRYPTION_KEY:?HIVY_SANDBOX_ENCRYPTION_KEY is required}
      HIVY_SPECIALIST_SANDBOX_RUNTIME_VERSION: ${HIVY_SPECIALIST_SANDBOX_RUNTIME_VERSION:?HIVY_SPECIALIST_SANDBOX_RUNTIME_VERSION is required}
      HIVY_REDIS_URL: ${HIVY_REDIS_URL:-}
      HIVY_REDIS_ADDR: ${HIVY_REDIS_ADDR:-redis:6379}
      HIVY_REDIS_PASSWORD: ${HIVY_REDIS_PASSWORD:-}
      HIVY_REDIS_DB: ${HIVY_REDIS_DB:-0}
      HIVY_REDIS_CACHE_TTL: ${HIVY_REDIS_CACHE_TTL:-30m}
      HIVY_MEM_CACHE_TTL: ${HIVY_MEM_CACHE_TTL:-5m}
      HIVY_MEM_CACHE_MAX_SIZE: ${HIVY_MEM_CACHE_MAX_SIZE:-10000}
      HIVY_FRONTEND_URL: http://localhost:${HIVY_COMPOSE_WEB_PORT:-30112}
      HIVY_CORS_ORIGINS: http://localhost:${HIVY_COMPOSE_WEB_PORT:-30112}
      HIVY_MCP_PORT: ${HIVY_MCP_PORT:-8081}
      HIVY_MCP_BASE_URL: http://host.docker.internal:${HIVY_COMPOSE_MCP_PORT:-8081}
      HIVY_NANGO_ENDPOINT: http://nango:3003
      HIVY_NANGO_SECRET_KEY: ${HIVY_NANGO_SECRET_KEY:?HIVY_NANGO_SECRET_KEY is required}
      HIVY_API_WEBHOOK_BASE_URL: http://host.docker.internal:${HIVY_COMPOSE_API_PORT:-8080}
      HIVY_SANDBOX_PROVIDER_ID: docker
      HIVY_SANDBOX_DOCKER_HOST: unix:///var/run/docker.sock
      HIVY_SANDBOX_DOCKER_PUBLIC_HOST: ${HIVY_SANDBOX_DOCKER_PUBLIC_HOST:-host.docker.internal}
      HIVY_AWS_ENDPOINT_URL: http://minio:9000
      HIVY_AWS_PRESIGN_ENDPOINT_URL: http://host.docker.internal:${HIVY_COMPOSE_MINIO_API_PORT:-9000}
      HIVY_PUBLIC_ASSETS_S3_ENDPOINT: http://minio:9000
      HIVY_PUBLIC_ASSETS_BASE_URL: http://localhost:9000/public-files-test
      HIVY_QDRANT_HOST: qdrant
      HIVY_QDRANT_PORT: ${HIVY_QDRANT_PORT:-6334}
    ports:
      - "${HIVY_COMPOSE_API_PORT:-8080}:8080"
      - "${HIVY_COMPOSE_MCP_PORT:-8081}:8081"
    volumes:
      - .:/workspace
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nango:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
      hindsight:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-local}
    command: ["sh", "-c", "mkdir -p /workspace/tmp && /go/bin/air -c .air.worker.toml"]
    env_file:
      - .env
    environment:
      HIVY_ENVIRONMENT: ${HIVY_ENVIRONMENT:-development}
      HIVY_PORT: "8080"
      HIVY_LOG_LEVEL: ${HIVY_LOG_LEVEL:-info}
      HIVY_LOG_FORMAT: ${HIVY_LOG_FORMAT:-text}
      HIVY_DATABASE_URL: ${HIVY_DATABASE_URL:-postgres://hivy:localdev@postgres:5432/hivy?sslmode=disable}
      HIVY_DB_HOST: ${HIVY_DB_HOST:-postgres}
      HIVY_DB_PORT: ${HIVY_DB_PORT:-5432}
      HIVY_DB_USER: ${HIVY_DB_USER:-hivy}
      HIVY_DB_PASSWORD: ${HIVY_DB_PASSWORD:-localdev}
      HIVY_DB_NAME: ${HIVY_DB_NAME:-hivy}
      HIVY_DB_SSLMODE: ${HIVY_DB_SSLMODE:-disable}
      HIVY_KMS_KEY: ${HIVY_KMS_KEY:?HIVY_KMS_KEY is required}
      HIVY_JWT_SIGNING_KEY: ${HIVY_JWT_SIGNING_KEY:?HIVY_JWT_SIGNING_KEY is required}
      HIVY_AUTH_RSA_PRIVATE_KEY: ${HIVY_AUTH_RSA_PRIVATE_KEY:?HIVY_AUTH_RSA_PRIVATE_KEY is required}
      HIVY_SANDBOX_ENCRYPTION_KEY: ${HIVY_SANDBOX_ENCRYPTION_KEY:?HIVY_SANDBOX_ENCRYPTION_KEY is required}
      HIVY_SPECIALIST_SANDBOX_RUNTIME_VERSION: ${HIVY_SPECIALIST_SANDBOX_RUNTIME_VERSION:?HIVY_SPECIALIST_SANDBOX_RUNTIME_VERSION is required}
      HIVY_REDIS_URL: ${HIVY_REDIS_URL:-}
      HIVY_REDIS_ADDR: ${HIVY_REDIS_ADDR:-redis:6379}
      HIVY_REDIS_PASSWORD: ${HIVY_REDIS_PASSWORD:-}
      HIVY_REDIS_DB: ${HIVY_REDIS_DB:-0}
      HIVY_REDIS_CACHE_TTL: ${HIVY_REDIS_CACHE_TTL:-30m}
      HIVY_MEM_CACHE_TTL: ${HIVY_MEM_CACHE_TTL:-5m}
      HIVY_MEM_CACHE_MAX_SIZE: ${HIVY_MEM_CACHE_MAX_SIZE:-10000}
      HIVY_FRONTEND_URL: http://localhost:${HIVY_COMPOSE_WEB_PORT:-30112}
      HIVY_NANGO_ENDPOINT: http://nango:3003
      HIVY_NANGO_SECRET_KEY: ${HIVY_NANGO_SECRET_KEY:?HIVY_NANGO_SECRET_KEY is required}
      HIVY_API_WEBHOOK_BASE_URL: http://host.docker.internal:${HIVY_COMPOSE_API_PORT:-8080}
      HIVY_SANDBOX_PROVIDER_ID: docker
      HIVY_SANDBOX_DOCKER_HOST: unix:///var/run/docker.sock
      HIVY_SANDBOX_DOCKER_PUBLIC_HOST: ${HIVY_SANDBOX_DOCKER_PUBLIC_HOST:-host.docker.internal}
      HIVY_AWS_ENDPOINT_URL: http://minio:9000
      HIVY_AWS_PRESIGN_ENDPOINT_URL: http://host.docker.internal:${HIVY_COMPOSE_MINIO_API_PORT:-9000}
      HIVY_PUBLIC_ASSETS_S3_ENDPOINT: http://minio:9000
      HIVY_PUBLIC_ASSETS_BASE_URL: http://localhost:9000/public-files-test
      HIVY_QDRANT_HOST: qdrant
      HIVY_QDRANT_PORT: ${HIVY_QDRANT_PORT:-6334}
      HIVY_WORKER_HEALTH_PORT: ${HIVY_WORKER_HEALTH_PORT:-8090}
    ports:
      - "${HIVY_COMPOSE_WORKER_HEALTH_PORT:-8090}:8090"
    volumes:
      - .:/workspace
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nango:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
      hindsight:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/healthz"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  web:
    image: node:22-alpine
    working_dir: /app
    command: >
      sh -c "corepack enable &&
             corepack prepare pnpm@10.18.2 --activate &&
             pnpm install --frozen-lockfile &&
             pnpm exec next dev --turbopack -H 0.0.0.0 -p 3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      HIVY_API_URL: http://api:8080
      NEXT_PUBLIC_HIVY_API_URL: http://localhost:${HIVY_COMPOSE_API_PORT:-8080}
      NEXT_PUBLIC_HIVY_CONNECTIONS_HOST: http://localhost:${HIVY_COMPOSE_NANGO_PORT:-23003}
      HIVY_SESSION_SECRET: ${HIVY_SESSION_SECRET:?HIVY_SESSION_SECRET is required}
      HIVY_SENTRY_DSN: ${HIVY_SENTRY_DSN:-}
      NEXT_PUBLIC_HIVY_SENTRY_DSN: ${NEXT_PUBLIC_HIVY_SENTRY_DSN:-}
      HIVY_SENTRY_TRACES_SAMPLE_RATE: ${HIVY_SENTRY_TRACES_SAMPLE_RATE:-0}
      NEXT_PUBLIC_HIVY_SENTRY_TRACES_SAMPLE_RATE: ${NEXT_PUBLIC_HIVY_SENTRY_TRACES_SAMPLE_RATE:-0}
    ports:
      - "${HIVY_COMPOSE_WEB_PORT:-30112}:3000"
    volumes:
      - ./apps/web:/app
      - web-pnpm-store:/root/.local/share/pnpm/store
      - web-node-modules:/app/node_modules
      - web-next-cache:/app/.next
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${HIVY_DB_NAME:-hivy}
      POSTGRES_USER: ${HIVY_DB_USER:-hivy}
      POSTGRES_PASSWORD: ${HIVY_DB_PASSWORD:-localdev}
    ports:
      - "${HIVY_COMPOSE_POSTGRES_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HIVY_DB_USER:-hivy}"]
      interval: 2s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "${HIVY_COMPOSE_REDIS_PORT:-16379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5

  # --- Real Nango runtime (custom Hivy integrations image) ---
  # Used for tests that must exercise Nango's real request validation instead
  # of the in-process fake/mock.
  nango:
    image: ghcr.io/usehivy/integrations:latest
    platform: linux/amd64
    environment:
      PORT: "3003"
      SERVER_PORT: "3003"
      NANGO_DB_HOST: postgres
      NANGO_DB_PORT: "5432"
      NANGO_DB_USER: ${HIVY_DB_USER:-hivy}
      NANGO_DB_PASSWORD: ${HIVY_DB_PASSWORD:-localdev}
      NANGO_DB_NAME: nango
      NANGO_DB_SSL: "false"
      NANGO_ENCRYPTION_KEY: ${HIVY_NANGO_ENCRYPTION_KEY:?HIVY_NANGO_ENCRYPTION_KEY is required}
      NANGO_SERVER_URL: ${HIVY_NANGO_PUBLIC_URL:-http://localhost:23003}
      NANGO_PUBLIC_SERVER_URL: ${HIVY_NANGO_PUBLIC_URL:-http://localhost:23003}
      NANGO_SECRET_KEY: ${HIVY_NANGO_SECRET_KEY:-00000000-0000-4000-8000-000000000001}
      NANGO_DASHBOARD_USERNAME: ${HIVY_NANGO_DASHBOARD_USERNAME:-local}
      NANGO_DASHBOARD_PASSWORD: ${HIVY_NANGO_DASHBOARD_PASSWORD:-local}
      FLAG_AUTH_ENABLED: "true"
      FLAG_SERVE_CONNECT_UI: "false"
      NANGO_LOGS_ENABLED: "false"
      TELEMETRY: "false"
    ports:
      - "${HIVY_COMPOSE_NANGO_PORT:-23003}:3003"
    depends_on:
      nango-db-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3003/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  nango-db-setup:
    image: postgres:17-alpine
    environment:
      PGPASSWORD: ${HIVY_DB_PASSWORD:-localdev}
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until pg_isready -h postgres -p 5432 -U ${HIVY_DB_USER:-hivy} -d ${HIVY_DB_NAME:-hivy}; do
        echo 'waiting for postgres TCP readiness...';
        sleep 1;
      done;
      until psql -h postgres -U ${HIVY_DB_USER:-hivy} -d ${HIVY_DB_NAME:-hivy} -c 'SELECT 1' >/dev/null 2>&1; do
        echo 'waiting for postgres SQL readiness...';
        sleep 1;
      done;
      psql -h postgres -U ${HIVY_DB_USER:-hivy} -d ${HIVY_DB_NAME:-hivy} -tc \"SELECT 1 FROM pg_database WHERE datname = 'nango'\" | grep -q 1 ||
      psql -h postgres -U ${HIVY_DB_USER:-hivy} -d ${HIVY_DB_NAME:-hivy} -c \"CREATE DATABASE nango OWNER ${HIVY_DB_USER:-hivy}\"
      "
    restart: "no"

  # --- Qdrant (vector database for RAG dev/test) ---
  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "${HIVY_COMPOSE_QDRANT_HTTP_PORT:-6333}:6333"
      - "${HIVY_COMPOSE_QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  # --- Hindsight (production-like memory service) ---
  hindsight:
    image: ${HIVY_COMPOSE_HINDSIGHT_IMAGE:-ghcr.io/vectorize-io/hindsight:latest-slim}
    env_file:
      - .env
    environment:
      HINDSIGHT_API_DATABASE_URL: postgresql://${HIVY_DB_USER:-hivy}:${HIVY_DB_PASSWORD:-localdev}@postgres:5432/${HIVY_DB_NAME:-hivy}
      HINDSIGHT_API_DATABASE_SCHEMA: ${HINDSIGHT_API_DATABASE_SCHEMA:-hindsight}
      HINDSIGHT_API_RUN_MIGRATIONS_ON_STARTUP: "true"
      HINDSIGHT_API_HOST: ${HINDSIGHT_API_HOST:-0.0.0.0}
      HINDSIGHT_API_PORT: ${HINDSIGHT_API_PORT:-8888}
      HINDSIGHT_API_WORKERS: ${HINDSIGHT_API_WORKERS:?HINDSIGHT_API_WORKERS is required}
      HINDSIGHT_API_WORKER_ENABLED: ${HINDSIGHT_API_WORKER_ENABLED:?HINDSIGHT_API_WORKER_ENABLED is required}
      HINDSIGHT_API_LOG_LEVEL: ${HINDSIGHT_API_LOG_LEVEL:-info}
      HINDSIGHT_API_LOG_FORMAT: ${HINDSIGHT_API_LOG_FORMAT:-json}
      HINDSIGHT_API_LLM_PROVIDER: ${HINDSIGHT_API_LLM_PROVIDER:?HINDSIGHT_API_LLM_PROVIDER is required}
      HINDSIGHT_API_LLM_BASE_URL: ${HINDSIGHT_API_LLM_BASE_URL:?HINDSIGHT_API_LLM_BASE_URL is required}
      HINDSIGHT_API_LLM_API_KEY: ${HINDSIGHT_API_LLM_API_KEY:?HINDSIGHT_API_LLM_API_KEY is required}
      HINDSIGHT_API_LLM_MODEL: ${HINDSIGHT_API_LLM_MODEL:?HINDSIGHT_API_LLM_MODEL is required}
      HINDSIGHT_API_CONSOLIDATION_LLM_PROVIDER: ${HINDSIGHT_API_CONSOLIDATION_LLM_PROVIDER:?HINDSIGHT_API_CONSOLIDATION_LLM_PROVIDER is required}
      HINDSIGHT_API_CONSOLIDATION_LLM_API_KEY: ${HINDSIGHT_API_CONSOLIDATION_LLM_API_KEY:?HINDSIGHT_API_CONSOLIDATION_LLM_API_KEY is required}
      HINDSIGHT_API_CONSOLIDATION_LLM_MODEL: ${HINDSIGHT_API_CONSOLIDATION_LLM_MODEL:?HINDSIGHT_API_CONSOLIDATION_LLM_MODEL is required}
      HINDSIGHT_API_REFLECT_LLM_PROVIDER: ${HINDSIGHT_API_REFLECT_LLM_PROVIDER:?HINDSIGHT_API_REFLECT_LLM_PROVIDER is required}
      HINDSIGHT_API_REFLECT_LLM_API_KEY: ${HINDSIGHT_API_REFLECT_LLM_API_KEY:?HINDSIGHT_API_REFLECT_LLM_API_KEY is required}
      HINDSIGHT_API_REFLECT_LLM_MODEL: ${HINDSIGHT_API_REFLECT_LLM_MODEL:?HINDSIGHT_API_REFLECT_LLM_MODEL is required}
      HINDSIGHT_API_RETAIN_LLM_PROVIDER: ${HINDSIGHT_API_RETAIN_LLM_PROVIDER:?HINDSIGHT_API_RETAIN_LLM_PROVIDER is required}
      HINDSIGHT_API_RETAIN_LLM_API_KEY: ${HINDSIGHT_API_RETAIN_LLM_API_KEY:?HINDSIGHT_API_RETAIN_LLM_API_KEY is required}
      HINDSIGHT_API_RETAIN_LLM_MODEL: ${HINDSIGHT_API_RETAIN_LLM_MODEL:?HINDSIGHT_API_RETAIN_LLM_MODEL is required}
      HINDSIGHT_API_EMBEDDINGS_PROVIDER: ${HINDSIGHT_API_EMBEDDINGS_PROVIDER:?HINDSIGHT_API_EMBEDDINGS_PROVIDER is required}
      HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY: ${HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY:?HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY is required}
      HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL: ${HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL:?HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL is required}
      HINDSIGHT_API_RERANKER_PROVIDER: ${HINDSIGHT_API_RERANKER_PROVIDER:?HINDSIGHT_API_RERANKER_PROVIDER is required}
      HINDSIGHT_API_RERANKER_ZEROENTROPY_API_KEY: ${HINDSIGHT_API_RERANKER_ZEROENTROPY_API_KEY:?HINDSIGHT_API_RERANKER_ZEROENTROPY_API_KEY is required}
      HINDSIGHT_API_RERANKER_ZEROENTROPY_MODEL: ${HINDSIGHT_API_RERANKER_ZEROENTROPY_MODEL:?HINDSIGHT_API_RERANKER_ZEROENTROPY_MODEL is required}
    ports:
      - "${HIVY_COMPOSE_HINDSIGHT_API_PORT:-8888}:${HINDSIGHT_API_PORT:-8888}"
    depends_on:
      postgres:
        condition: service_healthy

  # --- MinIO (S3-compatible object storage for LanceDB + filestore in dev/test) ---
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 2s
      timeout: 5s
      retries: 15

  # --- One-shot bucket creator for MinIO ---
  # Creates the hivy-rag-test bucket the Phase 0 LanceDB spike and later
  # RAG integration tests use. Exits 0 once the bucket exists.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/hivy-rag-test &&
      mc mb --ignore-existing local/public-files-test &&
      mc anonymous set download local/public-files-test &&
      echo 'buckets ready'
      "
    restart: "no"

volumes:
  pgdata:
  redisdata:
  miniodata:
  qdrantdata:
  go-mod-cache:
  go-build-cache:
  web-node-modules:
  web-pnpm-store:
  web-next-cache:
